# ── Dashboard & Chart Definitions ─────────────────────────────────────────────
# To add a new table/view's charts:
#   1. Drop a seed SQL file in seed/pg/ or seed/mysql/
#      (put business logic — weighting, bucketing, rollups — in SQL *views*,
#       not in this YAML or in Python)
#      For CSV-sourced data: place the CSV alongside a SQL loader in seed/pg/
#      (the directory is mounted into the analytics Postgres container at
#      /docker-entrypoint-initdb.d, so `COPY … FROM` works at init time).
#   2. Register the table or view in seed/import_datasources.yaml
#   3. Add chart entries below — no code changes needed.
#
# This file uses human-facing `visualization_type` labels. The Python seeder
# maps them to the internal Superset `viz_type` keys required by the API.
#
# Supported `visualization_type` values in the current build:
#   Bar Chart                → internal key: echarts_timeseries_bar
#                               works here for time or categorical x_axis;
#                               requires x_axis + metrics[]
#   Line Chart               → internal key: echarts_timeseries_line
#                               typically time-series; requires x_axis + metrics[]
#   Pie Chart                → internal key: pie
#                               requires groupby[] + metric{}
#   World Map                → internal key: world_map
#                               requires entity + country_fieldtype + metric{}
#   Country Map              → internal key: country_map
#                               lightweight, no Mapbox required; renders one
#                               country's top-level subdivisions from a
#                               bundled GeoJSON. Requires:
#                                 entity         → column holding ISO-3166-2
#                                                  codes (e.g. IN-KL)
#                                 select_country → lowercase country slug
#                                                  (e.g. 'india', 'usa')
#                                 metric{}       → value per subdivision
#   Big Number               → internal key: big_number_total
#                               requires metric{} or metrics[]
#   Big Number with Trendline → internal key: big_number
#                               requires metric{} or metrics[]
#   Histogram                → internal key: histogram_v2
#                               requires groupby/columns/x_axis + metric{}
#   Heatmap                  → internal key: heatmap_v2
#                               requires groupby/columns/x_axis + metric{}
#   Treemap                  → internal key: treemap_v2
#                               requires groupby/columns/x_axis + metric{}
#   Sunburst                 → internal key: sunburst_v2
#                               requires groupby/columns/x_axis + metric{}
#   Sankey                   → internal key: sankey_v2
#                               requires source + target + metric{}
#   MapBox                   → internal key: mapbox
#                               requires longitude + latitude and MAPBOX_API_KEY
#   Scatter Plot             → internal key: deck_scatter
#                               requires longitude + latitude and MAPBOX_API_KEY
#   deck.gl Scatterplot      → internal key: deck_scatter
#                               requires longitude + latitude and MAPBOX_API_KEY
#   deck.gl Heatmap          → internal key: deck_heatmap
#                               requires longitude + latitude and MAPBOX_API_KEY
#   deck.gl Polygon          → internal key: deck_polygon
#                               typically requires geojson/polygon columns and MAPBOX_API_KEY
#
# Optional per-chart fields:
#   required_columns: [col1, col2]  → validated before chart creation
#   row_limit: 10000                → default 10000
#
# Cross-filter wiring (drill-down):
#   cross_filter_source: true         → this chart emits cross-filters when
#                                       clicked (Superset's default once
#                                       cross_filters_enabled is on at the
#                                       dashboard level, but declaring it here
#                                       lets the seeder build an explicit
#                                       chart_configuration scope so the
#                                       emission only narrows the matched
#                                       receivers).
#   cross_filter_target: <chart-name> → this chart receives cross-filters from
#                                       the named source chart and ONLY from
#                                       that source. Charts without this key
#                                       are excluded from the source's scope,
#                                       which keeps country-wide KPIs from
#                                       collapsing to a single state when the
#                                       map is clicked.
#
# Layout headers:
#   Insert `- header: "..."` items between charts to draw a full-width section
#   header in the dashboard. Headers don't have charts; they break the current
#   row and start a fresh one underneath.

dashboards:

  - title: "LCA Dashboard"
    slug: lca-dashboard
    native_filters:
      - name: "State"
        column: State_label
        targets: [hh_master]
      - name: "District"
        column: District
        targets: [hh_master]
      - name: "Sector"
        column: Sector_label
        targets: [hh_master]
      - name: "Social Group"
        column: Social_Group_of_HH_Head_label
        targets: [hh_master]
      - name: "Religion"
        column: Religion_of_HH_Head_label
        targets: [hh_master]
      - name: "Year"
        column: Year
        targets: [hh_master]
    charts:

      # ── Row 1: National KPI strip — 8 at-a-glance metrics ─────────────────
      - database: analytics
        table: vw_state_summary
        name: "Total Households"
        visualization_type: Big Number
        required_columns: [hh_count]
        metric: {column: hh_count, aggregate: SUM}
        number_format: ".3s"
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "Average Household Size"
        visualization_type: Big Number
        required_columns: [avg_hh_size]
        metric: {column: avg_hh_size, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "Internet Access Rate"
        visualization_type: Big Number
        required_columns: [internet_rate]
        metric: {column: internet_rate, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "Ayushman Coverage Rate"
        visualization_type: Big Number
        required_columns: [ayushman_rate]
        metric: {column: ayushman_rate, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "LPG Subsidy Rate"
        visualization_type: Big Number
        required_columns: [lpg_subsidy_rate]
        metric: {column: lpg_subsidy_rate, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "Ration Card Coverage"
        visualization_type: Big Number
        required_columns: [ration_coverage]
        metric: {column: ration_coverage, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "Avg Education Years"
        visualization_type: Big Number
        required_columns: [avg_edu_years]
        metric: {column: avg_edu_years, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "Mobile Ownership Rate"
        visualization_type: Big Number
        required_columns: [mobile_ownership_rate]
        metric: {column: mobile_ownership_rate, aggregate: AVG}
        width: 3
        height: 16

      # ── Row 2: Geographic overview — choropleth + state bar side-by-side ──
      # Click any state on the choropleth → emits a cross-filter on `iso_code`
      # that drives all "Selected State Detail" charts below. The scope is
      # restricted to charts marked cross_filter_target: "India State Choropleth"
      # so the national KPIs and section bars stay at country totals.
      - database: analytics
        table: vw_state_summary
        name: "India State Choropleth"
        visualization_type: Country Map
        required_columns: [iso_code, hh_count]
        select_country: india
        entity: iso_code
        metric: {column: hh_count, aggregate: SUM}
        linear_color_scheme: blue_white_yellow
        number_format: SMART_NUMBER
        cross_filter_source: true
        row_limit: 50
        width: 8
        height: 56

      - database: analytics
        table: vw_state_summary
        name: "Households by State"
        visualization_type: Bar Chart
        required_columns: [state, hh_count]
        x_axis: state
        metrics:
          - {column: hh_count, aggregate: SUM}
        groupby: []
        row_limit: 50
        width: 4
        height: 56

      # ── State Detail drill-down (6 receivers, all filtered by map click) ──
      - header: "Selected State Detail — click any state on the map above to drill in"

      - database: analytics
        table: vw_district_summary
        name: "Selected State District Breakdown"
        visualization_type: Bar Chart
        required_columns: [iso_code, district, hh_count]
        x_axis: district
        metrics:
          - {column: hh_count, aggregate: SUM}
        groupby: []
        cross_filter_target: "India State Choropleth"
        row_limit: 75
        width: 6
        height: 44

      - database: analytics
        table: vw_welfare_kpis_long
        name: "Selected State Welfare Coverage"
        visualization_type: Bar Chart
        required_columns: [iso_code, scheme, coverage_rate]
        x_axis: scheme
        metrics:
          - {column: coverage_rate, aggregate: AVG}
        groupby: []
        cross_filter_target: "India State Choropleth"
        row_limit: 50
        width: 6
        height: 44

      - database: analytics
        table: vw_state_sector_summary
        name: "Selected State Sector Mix"
        visualization_type: Pie Chart
        required_columns: [iso_code, sector, hh_count]
        groupby: [sector]
        metric: {column: hh_count, aggregate: SUM}
        cross_filter_target: "India State Choropleth"
        row_limit: 50
        width: 4
        height: 44

      - database: analytics
        table: vw_digital_kpis_long
        name: "Selected State Digital Adoption"
        visualization_type: Bar Chart
        required_columns: [iso_code, channel, adoption_rate]
        x_axis: channel
        metrics:
          - {column: adoption_rate, aggregate: AVG}
        groupby: []
        cross_filter_target: "India State Choropleth"
        row_limit: 50
        width: 8
        height: 44

      - database: analytics
        table: vw_food_spend_state
        name: "Selected State Food Spend"
        visualization_type: Bar Chart
        required_columns: [iso_code, category, avg_spend]
        x_axis: category
        metrics:
          - {column: avg_spend, aggregate: AVG}
        groupby: []
        cross_filter_target: "India State Choropleth"
        row_limit: 50
        width: 6
        height: 44

      - database: analytics
        table: vw_asset_state
        name: "Selected State Asset Ownership"
        visualization_type: Bar Chart
        required_columns: [iso_code, asset, ownership_rate]
        x_axis: asset
        metrics:
          - {column: ownership_rate, aggregate: AVG}
        groupby: []
        cross_filter_target: "India State Choropleth"
        row_limit: 50
        width: 6
        height: 44

      # ── Demographics & Household Composition ──────────────────────────────
      - header: "Demographics & Household Composition"

      - database: analytics
        table: hh_master
        name: "Households by Sector"
        visualization_type: Pie Chart
        required_columns: [Sector_label, HHID]
        groupby: [Sector_label]
        metric: {column: HHID, aggregate: COUNT}
        width: 4
        height: 36

      - database: analytics
        table: hh_master
        name: "Households by Religion"
        visualization_type: Pie Chart
        required_columns: [Religion_of_HH_Head_label, HHID]
        groupby: [Religion_of_HH_Head_label]
        metric: {column: HHID, aggregate: COUNT}
        width: 4
        height: 36

      - database: analytics
        table: hh_master
        name: "Households by Social Group"
        visualization_type: Bar Chart
        required_columns: [Social_Group_of_HH_Head_label, HHID]
        x_axis: Social_Group_of_HH_Head_label
        metrics:
          - {column: HHID, aggregate: COUNT}
        groupby: []
        width: 4
        height: 36

      - database: analytics
        table: hh_master
        name: "Cooking Energy Source"
        visualization_type: Pie Chart
        required_columns: [Energy_Source_Cooking_label, HHID]
        groupby: [Energy_Source_Cooking_label]
        metric: {column: HHID, aggregate: COUNT}
        width: 4
        height: 36

      - database: analytics
        table: hh_master
        name: "Lighting Energy Source"
        visualization_type: Pie Chart
        required_columns: [Energy_Source_Lighting_label, HHID]
        groupby: [Energy_Source_Lighting_label]
        metric: {column: HHID, aggregate: COUNT}
        width: 4
        height: 36

      - database: analytics
        table: hh_master
        name: "Dwelling Type Distribution"
        visualization_type: Pie Chart
        required_columns: [Type_of_Dwelling_Unit_label, HHID]
        groupby: [Type_of_Dwelling_Unit_label]
        metric: {column: HHID, aggregate: COUNT}
        width: 4
        height: 36

      - database: analytics
        table: hh_master
        name: "Households by District"
        visualization_type: Bar Chart
        required_columns: [District, HHID]
        x_axis: District
        metrics:
          - {column: HHID, aggregate: COUNT}
        groupby: []
        row_limit: 75
        width: 12
        height: 44

      # ── Education & Digital Access ─────────────────────────────────────────
      - header: "Education & Digital Access"

      - database: analytics
        table: vw_state_summary
        name: "Average Education Years by State"
        visualization_type: Bar Chart
        required_columns: [state, avg_edu_years]
        x_axis: state
        metrics:
          - {column: avg_edu_years, aggregate: AVG}
        groupby: []
        row_limit: 50
        width: 6
        height: 44

      - database: analytics
        table: vw_state_summary
        name: "Internet Access Rate by State"
        visualization_type: Bar Chart
        required_columns: [state, internet_rate]
        x_axis: state
        metrics:
          - {column: internet_rate, aggregate: AVG}
        groupby: []
        row_limit: 50
        width: 6
        height: 44

      - database: analytics
        table: vw_digital_adoption
        name: "Digital Adoption by Sector"
        visualization_type: Bar Chart
        required_columns: [sector, internet_rate, online_grocery_rate]
        x_axis: sector
        metrics:
          - {column: internet_rate, aggregate: AVG}
          - {column: online_grocery_rate, aggregate: AVG}
        groupby: []
        width: 6
        height: 44

      - database: analytics
        table: vw_digital_adoption
        name: "Online Services Adoption"
        visualization_type: Bar Chart
        required_columns: [state, online_medicine_rate, online_education_rate]
        x_axis: state
        metrics:
          - {column: online_medicine_rate, aggregate: AVG}
          - {column: online_education_rate, aggregate: AVG}
        groupby: []
        row_limit: 50
        width: 6
        height: 44

      # ── Welfare & Social Protection ────────────────────────────────────────
      - header: "Welfare & Social Protection"

      - database: analytics
        table: vw_welfare_summary
        name: "Welfare Coverage by State"
        visualization_type: Bar Chart
        required_columns: [state, ayushman_rate, lpg_subsidy_rate, ration_rate]
        x_axis: state
        metrics:
          - {column: ayushman_rate, aggregate: AVG}
          - {column: lpg_subsidy_rate, aggregate: AVG}
          - {column: ration_rate, aggregate: AVG}
        groupby: []
        row_limit: 50
        width: 8
        height: 44

      - database: analytics
        table: hh_master
        name: "Ration Card Coverage"
        visualization_type: Pie Chart
        required_columns: [Ration_Card_Type_label, HHID]
        groupby: [Ration_Card_Type_label]
        metric: {column: HHID, aggregate: COUNT}
        width: 4
        height: 44

      # Grouped bar: x=kpi_name (6 metrics), series=social_group (4 groups)
      # Shows whether welfare reach is equitable across social groups.
      - database: analytics
        table: vw_social_group_kpis_long
        name: "Welfare Reach by Social Group"
        visualization_type: Bar Chart
        required_columns: [social_group, kpi_name, rate]
        x_axis: kpi_name
        metrics:
          - {column: rate, aggregate: AVG}
        groupby: [social_group]
        row_limit: 200
        width: 12
        height: 44

      # ── Food Security & Nutrition ──────────────────────────────────────────
      - header: "Food Security & Nutrition"

      - database: analytics
        table: vw_food_spend_long
        name: "Average Food Spend by Category"
        visualization_type: Bar Chart
        required_columns: [category, spend]
        x_axis: category
        metrics:
          - {column: spend, aggregate: AVG}
        groupby: []
        width: 6
        height: 44

      - database: analytics
        table: vw_food_spend_heatmap
        name: "Food Spend Heatmap"
        visualization_type: Heatmap
        required_columns: [state, category, avg_spend]
        x_axis: state
        groupby: [category]
        metric: {column: avg_spend, aggregate: AVG}
        row_limit: 1000
        width: 6
        height: 44

      # ── Asset Ownership & Living Standards ────────────────────────────────
      - header: "Asset Ownership & Living Standards"

      - database: analytics
        table: vw_asset_possession_long
        name: "Asset Ownership by Type"
        visualization_type: Bar Chart
        required_columns: [asset, owned]
        x_axis: asset
        metrics:
          - {column: owned, aggregate: AVG}
        groupby: []
        width: 6
        height: 44

      - database: analytics
        table: vw_asset_ownership_heatmap
        name: "Asset Ownership Heatmap"
        visualization_type: Heatmap
        required_columns: [state, asset, ownership_rate]
        x_axis: state
        groupby: [asset]
        metric: {column: ownership_rate, aggregate: AVG}
        row_limit: 1000
        width: 6
        height: 44

      # ── Non-Food Expenditure Patterns ─────────────────────────────────────
      - header: "Non-Food Expenditure Patterns"

      - database: analytics
        table: vw_expenditure_long
        name: "Non-Food Spend by Category"
        visualization_type: Bar Chart
        required_columns: [category, avg_spend]
        x_axis: category
        metrics:
          - {column: avg_spend, aggregate: AVG}
        groupby: []
        row_limit: 50
        width: 12
        height: 44

      # ── Income & Employment Flows ──────────────────────────────────────────
      - header: "Income & Employment Flows"

      - database: analytics
        table: vw_income_source_flow
        name: "Income Source to Sector Flow"
        visualization_type: Sankey
        required_columns: [source, target, hh_count]
        source: source
        target: target
        metric: {column: hh_count, aggregate: SUM}
        width: 12
        height: 56
