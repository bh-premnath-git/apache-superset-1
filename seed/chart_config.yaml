# ── Dashboard & Chart Definitions ─────────────────────────────────────────────
# To add a new table/view's charts:
#   1. Drop a seed SQL file in seed/pg/ or seed/mysql/
#      (put business logic — weighting, bucketing, rollups — in SQL *views*,
#       not in this YAML or in Python)
#      For CSV-sourced data: place the CSV alongside a SQL loader in seed/pg/
#      (the directory is mounted into the analytics Postgres container at
#      /docker-entrypoint-initdb.d, so `COPY … FROM` works at init time).
#   2. Register the table or view in seed/import_datasources.yaml
#   3. Add chart entries below — no code changes needed.
#
# This file uses human-facing `visualization_type` labels. The Python seeder
# maps them to the internal Superset `viz_type` keys required by the API.
#
# Supported `visualization_type` values in the current build:
#   Bar Chart                → internal key: echarts_timeseries_bar
#                               works here for time or categorical x_axis;
#                               requires x_axis + metrics[]
#   Line Chart               → internal key: echarts_timeseries_line
#                               typically time-series; requires x_axis + metrics[]
#   Pie Chart                → internal key: pie
#                               requires groupby[] + metric{}
#   World Map                → internal key: world_map
#                               requires entity + country_fieldtype + metric{}
#   Country Map              → internal key: country_map
#                               lightweight, no Mapbox required; renders one
#                               country's top-level subdivisions from a
#                               bundled GeoJSON. Requires:
#                                 entity         → column holding ISO-3166-2
#                                                  codes (e.g. IN-KL)
#                                 select_country → lowercase country slug
#                                                  (e.g. 'india', 'usa')
#                                 metric{}       → value per subdivision
#   Big Number               → internal key: big_number_total
#                               requires metric{} or metrics[]
#   Big Number with Trendline → internal key: big_number
#                               requires metric{} or metrics[]
#   Histogram                → internal key: histogram_v2
#                               requires groupby/columns/x_axis + metric{}
#   Heatmap                  → internal key: heatmap_v2
#                               requires groupby/columns/x_axis + metric{}
#   Treemap                  → internal key: treemap_v2
#                               requires groupby/columns/x_axis + metric{}
#   Sunburst                 → internal key: sunburst_v2
#                               requires groupby/columns/x_axis + metric{}
#   Sankey                   → internal key: sankey_v2
#                               requires source + target + metric{}
#   MapBox                   → internal key: mapbox
#                               requires longitude + latitude and MAPBOX_API_KEY
#   Scatter Plot             → internal key: deck_scatter
#                               requires longitude + latitude and MAPBOX_API_KEY
#   deck.gl Scatterplot      → internal key: deck_scatter
#                               requires longitude + latitude and MAPBOX_API_KEY
#   deck.gl Heatmap          → internal key: deck_heatmap
#                               requires longitude + latitude and MAPBOX_API_KEY
#   deck.gl Polygon          → internal key: deck_polygon
#                               typically requires geojson/polygon columns and MAPBOX_API_KEY
#
# Optional per-chart fields:
#   required_columns: [col1, col2]  → validated before chart creation
#   row_limit: 10000                → default 10000
#
# Cross-filter wiring (drill-down):
#   cross_filter_source: true         → this chart emits cross-filters when
#                                       clicked (Superset's default once
#                                       cross_filters_enabled is on at the
#                                       dashboard level, but declaring it here
#                                       lets the seeder build an explicit
#                                       chart_configuration scope so the
#                                       emission only narrows the matched
#                                       receivers).
#   cross_filter_target: <chart-name> → this chart receives cross-filters from
#                                       the named source chart and ONLY from
#                                       that source. Charts without this key
#                                       are excluded from the source's scope,
#                                       which keeps country-wide KPIs from
#                                       collapsing to a single state when the
#                                       map is clicked.
#
# Layout headers:
#   Insert `- header: "..."` items between charts to draw a full-width section
#   header in the dashboard. Headers don't have charts; they break the current
#   row and start a fresh one underneath.

# ── Reusable Handlebars template anchors ──────────────────────────────────────
# The seeder ignores this top-level key; PyYAML resolves anchors before Python
# sees the data, so *pct_kpi_tpl can be referenced anywhere below.
_templates:
  pct_kpi: &pct_kpi_tpl |
    <style>
    .kpi-pw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:8px 12px}
    .kpi-pn{font-size:28px;font-weight:700;color:#1e293b;line-height:1}
    .kpi-pb{width:100%;height:6px;background:#e2e8f0;border-radius:3px;margin-top:10px;overflow:hidden}
    .kpi-pf{height:100%;border-radius:3px;background:#2563eb}
    </style>
    {{#each data}}
    <div class="kpi-pw">
      <div class="kpi-pn">{{this.value}}%</div>
      <div class="kpi-pb"><div class="kpi-pf" style="width:{{this.value}}%"></div></div>
    </div>
    {{/each}}

dashboards:

  - title: "LCA Overview Dashboard"
    slug: lca-overview-dashboard
    native_filters:
      - name: "State"
        column: state
        targets: [vw_state_summary, vw_welfare_summary, vw_food_spend_state, vw_asset_state, vw_state_geo_points]
    charts:

      - database: analytics
        table: vw_state_summary
        name: "Overview Total Households"
        visualization_type: Big Number
        required_columns: [hh_count]
        metric: {column: hh_count, aggregate: SUM}
        number_format: ".3s"
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "Overview Internet Access Rate"
        visualization_type: Big Number
        required_columns: [internet_rate]
        metric: {column: internet_rate, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "Overview Avg Education Years"
        visualization_type: Big Number
        required_columns: [avg_edu_years]
        metric: {column: avg_edu_years, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "Overview Mobile Ownership Rate"
        visualization_type: Big Number
        required_columns: [mobile_ownership_rate]
        metric: {column: mobile_ownership_rate, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_state_summary
        name: "Overview India State Choropleth"
        visualization_type: Country Map
        required_columns: [iso_code, hh_count]
        select_country: india
        entity: iso_code
        metric: {column: hh_count, aggregate: SUM}
        cross_filter_source: true
        row_limit: 50
        width: 8
        height: 56

      - database: analytics
        table: vw_state_summary
        name: "Overview Households by State"
        visualization_type: Bar Chart
        required_columns: [state, hh_count]
        x_axis: state
        metrics:
          - {column: hh_count, aggregate: SUM}
        groupby: []
        row_limit: 50
        width: 4
        height: 56

      - header: "Selected State Detail"

      - database: analytics
        table: vw_district_summary
        name: "Overview Selected State District Breakdown"
        visualization_type: Bar Chart
        required_columns: [iso_code, district, hh_count]
        x_axis: district
        metrics:
          - {column: hh_count, aggregate: SUM}
        groupby: []
        cross_filter_target: "Overview India State Choropleth"
        row_limit: 75
        width: 6
        height: 44

      - database: analytics
        table: vw_welfare_kpis_long
        name: "Overview Selected State Welfare Coverage"
        visualization_type: Bar Chart
        required_columns: [iso_code, scheme, coverage_rate]
        x_axis: scheme
        metrics:
          - {column: coverage_rate, aggregate: AVG}
        groupby: []
        cross_filter_target: "Overview India State Choropleth"
        row_limit: 50
        width: 6
        height: 44

      - database: analytics
        table: vw_digital_kpis_long
        name: "Overview Selected State Digital Adoption"
        visualization_type: Bar Chart
        required_columns: [iso_code, channel, adoption_rate]
        x_axis: channel
        metrics:
          - {column: adoption_rate, aggregate: AVG}
        groupby: []
        cross_filter_target: "Overview India State Choropleth"
        row_limit: 50
        width: 6
        height: 44

      - database: analytics
        table: vw_food_spend_state
        name: "Overview Selected State Food Spend"
        visualization_type: Bar Chart
        required_columns: [iso_code, category, avg_spend]
        x_axis: category
        metrics:
          - {column: avg_spend, aggregate: AVG}
        groupby: []
        cross_filter_target: "Overview India State Choropleth"
        row_limit: 50
        width: 6
        height: 44

  - title: "LCA District Drill Dashboard"
    slug: lca-district-drill-dashboard
    native_filters:
      - name: "State ISO"
        column: iso_code
        targets: [vw_district_summary, vw_district_sector_drill, vw_district_social_group_drill]
      - name: "District"
        column: district
        targets: [vw_district_summary, vw_district_sector_drill, vw_district_social_group_drill]
    charts:

      - database: analytics
        table: vw_district_summary
        name: "District Drill Breakdown"
        visualization_type: Bar Chart
        required_columns: [iso_code, district, hh_count]
        x_axis: district
        metrics:
          - {column: hh_count, aggregate: SUM}
        groupby: []
        cross_filter_source: true
        row_limit: 100
        width: 12
        height: 48

      - database: analytics
        table: vw_district_sector_drill
        name: "District Drill by Sector"
        visualization_type: Bar Chart
        required_columns: [iso_code, district, sector, hh_count]
        x_axis: district
        metrics:
          - {column: hh_count, aggregate: SUM}
        groupby: [sector]
        cross_filter_target: "District Drill Breakdown"
        row_limit: 150
        width: 6
        height: 44

      - database: analytics
        table: vw_district_social_group_drill
        name: "District Drill by Social Group"
        visualization_type: Bar Chart
        required_columns: [iso_code, district, social_group, hh_count]
        x_axis: district
        metrics:
          - {column: hh_count, aggregate: SUM}
        groupby: [social_group]
        cross_filter_target: "District Drill Breakdown"
        row_limit: 150
        width: 6
        height: 44

      - database: analytics
        table: vw_district_sector_drill
        name: "District Internet Access by Sector"
        visualization_type: Bar Chart
        required_columns: [district, sector, internet_rate]
        x_axis: district
        metrics:
          - {column: internet_rate, aggregate: AVG}
        groupby: [sector]
        cross_filter_target: "District Drill Breakdown"
        row_limit: 150
        width: 6
        height: 44

      - database: analytics
        table: vw_district_social_group_drill
        name: "District Welfare by Social Group"
        visualization_type: Bar Chart
        required_columns: [district, social_group, ayushman_rate]
        x_axis: district
        metrics:
          - {column: ayushman_rate, aggregate: AVG}
          - {column: ration_rate, aggregate: AVG}
        groupby: [social_group]
        cross_filter_target: "District Drill Breakdown"
        row_limit: 150
        width: 6
        height: 44

  - title: "LCA Household & Segment Explorer"
    slug: lca-household-segment-explorer
    native_filters:
      - name: "State ISO"
        column: iso_code
        targets: [vw_state_sector_social_group_drill, vw_household_drill_base]
      - name: "Sector"
        column: sector
        targets: [vw_state_sector_social_group_drill, vw_household_drill_base]
      - name: "Social Group"
        column: social_group
        targets: [vw_state_sector_social_group_drill, vw_household_drill_base]
      - name: "District"
        column: district
        targets: [vw_household_drill_base]
    charts:

      - database: analytics
        table: vw_household_drill_base
        name: "Explorer Household Count"
        visualization_type: Big Number
        required_columns: [hhid]
        metric: {column: hhid, aggregate: COUNT}
        number_format: ".3s"
        width: 3
        height: 16

      - database: analytics
        table: vw_household_drill_base
        name: "Explorer Internet Access"
        visualization_type: Big Number
        required_columns: [internet_access]
        metric: {column: internet_access, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_household_drill_base
        name: "Explorer Mobile Ownership"
        visualization_type: Big Number
        required_columns: [mobile_ownership]
        metric: {column: mobile_ownership, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_household_drill_base
        name: "Explorer Avg Education Years"
        visualization_type: Big Number
        required_columns: [avg_edu_years]
        metric: {column: avg_edu_years, aggregate: AVG}
        width: 3
        height: 16

      - database: analytics
        table: vw_state_sector_social_group_drill
        name: "Explorer Sector and Social Group Heatmap"
        visualization_type: Heatmap
        required_columns: [iso_code, sector, social_group, hh_count]
        x_axis: sector
        groupby: [social_group]
        metric: {column: hh_count, aggregate: SUM}
        row_limit: 150
        width: 6
        height: 44

      - database: analytics
        table: vw_state_sector_social_group_drill
        name: "Explorer Internet Rate by Segment"
        visualization_type: Bar Chart
        required_columns: [sector, social_group, internet_rate]
        x_axis: sector
        metrics:
          - {column: internet_rate, aggregate: AVG}
        groupby: [social_group]
        row_limit: 150
        width: 6
        height: 44

      - database: analytics
        table: vw_household_drill_base
        name: "Explorer Household Detail Table"
        viz_type: table
        required_columns: [hhid, state, district, sector, social_group]
        all_columns: [hhid, state, district, sector, social_group, religion, income_source, hh_size, avg_edu_years, internet_access, ayushman_beneficiary, lpg_subsidy_received, ration_received, fee_waiver_received, mobile_ownership, car_ownership, cereal_spend, electricity_spend, beverages_spend]
        row_limit: 200
        width: 12
        height: 56

  - title: "LCA Rural Segments Comparison"
    slug: lca-rural-segments-comparison
    native_filters:
      - name: "State"
        column: state
        targets: [vw_rural_segment_matrix, vw_rural_segments]
      - name: "Segment"
        column: segment
        targets: [vw_rural_segment_matrix]
        multi_select: true
    charts:

      - database: analytics
        table: vw_rural_segment_matrix
        name: "Rural Segments comparison"
        viz_type: handlebars
        required_columns: [state, segment, segment_class, segment_order, size_pct, size_offset, hh_count, cereal_spend_pct, edu_pct, mcpe_inr, internet_pct, high_online_pct, no_digital_pct, scst_pct, uhs_minor_pct, large_hh_pct, pmgky_pct, ayushman_pct, ration_pct]
        groupby: [segment]
        columns:
          - segment_class
          - segment_order
          - size_pct
          - size_offset
          - hh_count
          - cereal_spend_pct
          - edu_pct
          - mcpe_inr
          - internet_pct
          - high_online_pct
          - no_digital_pct
          - scst_pct
          - uhs_minor_pct
          - large_hh_pct
          - pmgky_pct
          - ayushman_pct
          - ration_pct
        metric: {column: hh_count, aggregate: SUM}
        emit_filter: true
        cross_filter_source: true
        row_limit: 1000
        width: 12
        height: 72
        handlebars_template: |
          <style>
          .rsc-wrap {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff;
            overflow: auto;
          }
          .rsc-hdr-bar {
            background: #1e2d4a;
            padding: 12px 20px 14px;
            margin-bottom: 0;
          }
          .rsc-hdr-sub {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 3px;
          }
          .rsc-hdr-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
          }
          .rsc-body {
            padding: 0 4px 8px;
          }
          .rsc-cat-row,
          .rsc-sub-row,
          .rsc-row {
            display: grid;
            grid-template-columns: 140px 68px repeat(3, minmax(52px,1fr)) repeat(3, minmax(52px,1fr)) repeat(3, minmax(52px,1fr)) repeat(3, minmax(52px,1fr));
            align-items: center;
          }
          .rsc-cat-row {
            margin-top: 6px;
          }
          .rsc-cat-row > div:first-child {
            grid-column: span 1;
          }
          .rsc-cat {
            padding: 7px 4px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #fff;
            text-align: center;
            border-radius: 3px 3px 0 0;
            grid-column: span 3;
            margin: 0 1px;
          }
          .rsc-cat-size {
            grid-column: span 1;
            background: #475569;
          }
          .rsc-cat-econ { background: #1d4ed8; }
          .rsc-cat-dig  { background: #047857; }
          .rsc-cat-hum  { background: #5b21b6; }
          .rsc-cat-wel  { background: #92400e; }
          .rsc-sub-row {
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            border-bottom: 2px solid #cbd5e1;
            margin-bottom: 2px;
          }
          .rsc-sub {
            padding: 5px 3px;
            font-size: 8.5px;
            font-weight: 600;
            color: #475569;
            text-align: center;
            line-height: 1.3;
          }
          .rsc-sub-lbl {
            text-align: left;
            padding-left: 10px;
          }
          .rsc-row {
            border-bottom: 1px solid #f1f5f9;
            padding: 10px 0;
            min-height: 64px;
          }
          .rsc-row:last-child {
            border-bottom: none;
          }
          .rsc-seg {
            padding-left: 10px;
          }
          .rsc-seg-name {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
          }
          .rsc-seg-id {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 2px;
          }
          .rural-aspirant .rsc-seg-name    { color: #f97316; }
          .rural-disconnected .rsc-seg-name { color: #ea580c; }
          .rural-constrained .rsc-seg-name  { color: #7c3aed; }
          .rsc-pie-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
          }
          .rsc-arc { stroke: #94a3b8; }
          .rural-stable .rsc-arc      { stroke: #64748b; }
          .rural-aspirant .rsc-arc    { stroke: #f97316; }
          .rural-disconnected .rsc-arc { stroke: #ea580c; }
          .rural-constrained .rsc-arc  { stroke: #7c3aed; }
          .rsc-pie-lbl {
            font-size: 10px;
            font-weight: 700;
            color: #475569;
          }
          .rsc-mc {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2px 3px;
            gap: 5px;
          }
          .rsc-v {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            white-space: nowrap;
          }
          .rsc-inr {
            font-size: 12px;
          }
          .rsc-wel {
            color: #92400e;
          }
          .rsc-bw {
            width: 44px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
          }
          .rsc-b {
            height: 100%;
            border-radius: 2px;
          }
          .rsc-b-econ { background: #2563eb; }
          .rsc-b-dig  { background: #059669; }
          .rsc-b-grey { background: #94a3b8; }
          .rsc-b-hum  { background: #6d28d9; }
          .rsc-b-wel  { background: #92400e; }
          </style>
          <div class="rsc-wrap">
            <div class="rsc-body">
              <div class="rsc-cat-row">
                <div></div>
                <div class="rsc-cat rsc-cat-size">SIZE</div>
                <div class="rsc-cat rsc-cat-econ">ECONOMIC CONDITION</div>
                <div class="rsc-cat rsc-cat-dig">DIGITAL CONNECTIVITY</div>
                <div class="rsc-cat rsc-cat-hum">HUMAN CAPITAL</div>
                <div class="rsc-cat rsc-cat-wel">WELFARE &amp; VULNERABILITY</div>
              </div>
              <div class="rsc-sub-row">
                <div class="rsc-sub rsc-sub-lbl">Segment</div>
                <div class="rsc-sub">Size (%)</div>
                <div class="rsc-sub">Food<br>spend &gt;50%</div>
                <div class="rsc-sub">Edu<br>spend &gt;5%</div>
                <div class="rsc-sub">MCPE<br>(INR)</div>
                <div class="rsc-sub">Family<br>internet use</div>
                <div class="rsc-sub">High online<br>connect.</div>
                <div class="rsc-sub">No digital<br>purchase</div>
                <div class="rsc-sub">SC-ST<br>compos.</div>
                <div class="rsc-sub">UHS minors<br>&gt;3</div>
                <div class="rsc-sub">HH size<br>&gt;6</div>
                <div class="rsc-sub">Has<br>PMGKY</div>
                <div class="rsc-sub">Ayushman<br>card</div>
                <div class="rsc-sub">Ration<br>card</div>
              </div>
              {{#each data}}
              <div class="rsc-row {{this.segment_class}}">
                <div class="rsc-seg">
                  <div class="rsc-seg-name">{{this.segment}}</div>
                  <div class="rsc-seg-id">R{{this.segment_order}}</div>
                </div>
                <div class="rsc-pie-cell">
                  <svg class="rsc-pie-svg" width="36" height="36" viewBox="0 0 36 36">
                    <circle cx="18" cy="18" r="18" fill="#e5e7eb"/>
                    <circle class="rsc-arc" cx="18" cy="18" r="9" fill="transparent"
                      stroke-width="18"
                      stroke-dasharray="56.55"
                      stroke-dashoffset="{{this.size_offset}}"
                      transform="rotate(-90 18 18)"/>
                  </svg>
                  <div class="rsc-pie-lbl">{{this.size_pct}}%</div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v">{{this.cereal_spend_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-econ" style="width:{{this.cereal_spend_pct}}%"></div></div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v">{{this.edu_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-econ" style="width:{{this.edu_pct}}%"></div></div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v rsc-inr">&#8377;{{this.mcpe_inr}}</div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v">{{this.internet_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-dig" style="width:{{this.internet_pct}}%"></div></div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v">{{this.high_online_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-dig" style="width:{{this.high_online_pct}}%"></div></div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v">{{this.no_digital_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-grey" style="width:{{this.no_digital_pct}}%"></div></div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v">{{this.scst_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-hum" style="width:{{this.scst_pct}}%"></div></div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v">{{this.uhs_minor_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-hum" style="width:{{this.uhs_minor_pct}}%"></div></div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v">{{this.large_hh_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-hum" style="width:{{this.large_hh_pct}}%"></div></div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v rsc-wel">{{this.pmgky_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-wel" style="width:{{this.pmgky_pct}}%"></div></div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v rsc-wel">{{this.ayushman_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-wel" style="width:{{this.ayushman_pct}}%"></div></div>
                </div>
                <div class="rsc-mc">
                  <div class="rsc-v rsc-wel">{{this.ration_pct}}%</div>
                  <div class="rsc-bw"><div class="rsc-b rsc-b-wel" style="width:{{this.ration_pct}}%"></div></div>
                </div>
              </div>
              {{/each}}
            </div>
          </div>
        css_styles: |
          .rsc-wrap {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff;
            overflow: auto;
          }
          .rsc-body {
            padding: 0 4px 8px;
          }
          .rsc-cat-row,
          .rsc-sub-row,
          .rsc-row {
            display: grid;
            grid-template-columns: 140px 68px repeat(3, minmax(52px,1fr)) repeat(3, minmax(52px,1fr)) repeat(3, minmax(52px,1fr)) repeat(3, minmax(52px,1fr));
            align-items: center;
          }
          .rsc-cat-row {
            margin-top: 6px;
          }
          .rsc-cat-row > div:first-child {
            grid-column: span 1;
          }
          .rsc-cat {
            padding: 7px 4px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #fff;
            text-align: center;
            border-radius: 3px 3px 0 0;
            grid-column: span 3;
            margin: 0 1px;
          }
          .rsc-cat-size {
            grid-column: span 1;
            background: #475569;
          }
          .rsc-cat-econ { background: #1d4ed8; }
          .rsc-cat-dig  { background: #047857; }
          .rsc-cat-hum  { background: #5b21b6; }
          .rsc-cat-wel  { background: #92400e; }
          .rsc-sub-row {
            background: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            border-bottom: 2px solid #cbd5e1;
            margin-bottom: 2px;
          }
          .rsc-sub {
            padding: 5px 3px;
            font-size: 8.5px;
            font-weight: 600;
            color: #475569;
            text-align: center;
            line-height: 1.3;
          }
          .rsc-sub-lbl {
            text-align: left;
            padding-left: 10px;
          }
          .rsc-row {
            border-bottom: 1px solid #f1f5f9;
            padding: 10px 0;
            min-height: 64px;
          }
          .rsc-row:last-child {
            border-bottom: none;
          }
          .rsc-seg {
            padding-left: 10px;
          }
          .rsc-seg-name {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
          }
          .rsc-seg-id {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 2px;
          }
          .rural-aspirant .rsc-seg-name    { color: #f97316; }
          .rural-disconnected .rsc-seg-name { color: #ea580c; }
          .rural-constrained .rsc-seg-name  { color: #7c3aed; }
          .rsc-pie-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
          }
          .rsc-arc { stroke: #94a3b8; }
          .rural-stable .rsc-arc      { stroke: #64748b; }
          .rural-aspirant .rsc-arc    { stroke: #f97316; }
          .rural-disconnected .rsc-arc { stroke: #ea580c; }
          .rural-constrained .rsc-arc  { stroke: #7c3aed; }
          .rsc-pie-lbl {
            font-size: 10px;
            font-weight: 700;
            color: #475569;
          }
          .rsc-mc {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2px 3px;
            gap: 5px;
          }
          .rsc-v {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            white-space: nowrap;
          }
          .rsc-inr {
            font-size: 12px;
          }
          .rsc-wel {
            color: #92400e;
          }
          .rsc-bw {
            width: 44px;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
          }
          .rsc-b {
            height: 100%;
            border-radius: 2px;
          }
          .rsc-b-econ { background: #2563eb; }
          .rsc-b-dig  { background: #059669; }
          .rsc-b-grey { background: #94a3b8; }
          .rsc-b-hum  { background: #6d28d9; }
          .rsc-b-wel  { background: #92400e; }
