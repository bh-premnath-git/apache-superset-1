# ── Dashboard & Chart Definitions ─────────────────────────────────────────────
# To add a new table/view's charts:
#   1. Drop a seed SQL file in seed/pg/ or seed/mysql/
#      (put business logic — weighting, bucketing, rollups — in SQL *views*,
#       not in this YAML or in Python)
#      For CSV-sourced data: place the CSV alongside a SQL loader in seed/pg/
#      (the directory is mounted into the analytics Postgres container at
#      /docker-entrypoint-initdb.d, so `COPY … FROM` works at init time).
#   2. Register the table or view in seed/import_datasources.yaml
#   3. Add chart entries below — no code changes needed.
#
# This file uses human-facing `visualization_type` labels. The Python seeder
# maps them to the internal Superset `viz_type` keys required by the API.
#
# Supported `visualization_type` values in the current build:
#   Bar Chart                → internal key: echarts_timeseries_bar
#                               works here for time or categorical x_axis;
#                               requires x_axis + metrics[]
#   Line Chart               → internal key: echarts_timeseries_line
#                               typically time-series; requires x_axis + metrics[]
#   Pie Chart                → internal key: pie
#                               requires groupby[] + metric{}
#   World Map                → internal key: world_map
#                               requires entity + country_fieldtype + metric{}
#   Country Map              → internal key: country_map
#                               lightweight, no Mapbox required; renders one
#                               country's top-level subdivisions from a
#                               bundled GeoJSON. Requires:
#                                 entity         → column holding ISO-3166-2
#                                                  codes (e.g. IN-KL)
#                                 select_country → lowercase country slug
#                                                  (e.g. 'india', 'usa')
#                                 metric{}       → value per subdivision
#   Big Number               → internal key: big_number_total
#                               requires metric{} or metrics[]
#   Big Number with Trendline → internal key: big_number
#                               requires metric{} or metrics[]
#   Histogram                → internal key: histogram_v2
#                               requires groupby/columns/x_axis + metric{}
#   Heatmap                  → internal key: heatmap_v2
#                               requires groupby/columns/x_axis + metric{}
#   Treemap                  → internal key: treemap_v2
#                               requires groupby/columns/x_axis + metric{}
#   Sunburst                 → internal key: sunburst_v2
#                               requires groupby/columns/x_axis + metric{}
#   Sankey                   → internal key: sankey_v2
#                               requires source + target + metric{}
#   MapBox                   → internal key: mapbox
#                               requires longitude + latitude and MAPBOX_API_KEY
#   Scatter Plot             → internal key: deck_scatter
#                               requires longitude + latitude and MAPBOX_API_KEY
#   deck.gl Scatterplot      → internal key: deck_scatter
#                               requires longitude + latitude and MAPBOX_API_KEY
#   deck.gl Heatmap          → internal key: deck_heatmap
#                               requires longitude + latitude and MAPBOX_API_KEY
#   deck.gl Polygon          → internal key: deck_polygon
#                               typically requires geojson/polygon columns and MAPBOX_API_KEY
#
# Optional per-chart fields:
#   required_columns: [col1, col2]  → validated before chart creation
#   row_limit: 10000                → default 10000

dashboards:

  - title: "LCA Dashboard"
    slug: lca-dashboard
    native_filters:
      - name: "State"
        column: State_label
        targets: [hh_master]
      - name: "District"
        column: District
        targets: [hh_master]
      - name: "Sector"
        column: Sector_label
        targets: [hh_master]
      - name: "Social Group"
        column: Social_Group_of_HH_Head_label
        targets: [hh_master]
      - name: "Religion"
        column: Religion_of_HH_Head_label
        targets: [hh_master]
      - name: "Year"
        column: Year
        targets: [hh_master]
    charts:

      - database: analytics
        table: vw_state_summary
        name: "Total Households Surveyed"
        visualization_type: Big Number
        required_columns: [hh_count]
        metric: {column: hh_count, aggregate: SUM}

      - database: analytics
        table: vw_state_summary
        name: "Average Household Size"
        visualization_type: Big Number
        required_columns: [avg_hh_size]
        metric: {column: avg_hh_size, aggregate: AVG}

      - database: analytics
        table: vw_state_summary
        name: "Internet Access Rate"
        visualization_type: Big Number
        required_columns: [internet_rate]
        metric: {column: internet_rate, aggregate: AVG}

      - database: analytics
        table: vw_state_summary
        name: "Ayushman Coverage Rate"
        visualization_type: Big Number
        required_columns: [ayushman_rate]
        metric: {column: ayushman_rate, aggregate: AVG}

      - database: analytics
        table: vw_state_summary
        name: "India State Choropleth"
        visualization_type: Country Map
        required_columns: [iso_code, hh_count]
        select_country: india
        entity: iso_code
        metric: {column: hh_count, aggregate: SUM}
        linear_color_scheme: blue_white_yellow
        number_format: SMART_NUMBER
        emit_filter: true
        row_limit: 50

      - database: analytics
        table: hh_master
        name: "Households by State"
        visualization_type: Bar Chart
        required_columns: [State_label, HHID]
        x_axis: State_label
        emit_filter: true
        metrics:
          - {column: HHID, aggregate: COUNT}
        groupby: []
        row_limit: 50

      - database: analytics
        table: hh_master
        name: "Households by District"
        visualization_type: Bar Chart
        required_columns: [District, HHID]
        x_axis: District
        emit_filter: true
        metrics:
          - {column: HHID, aggregate: COUNT}
        groupby: []
        row_limit: 75

      - database: analytics
        table: hh_master
        name: "Households by Sector"
        visualization_type: Pie Chart
        required_columns: [Sector_label, HHID]
        groupby: [Sector_label]
        metric: {column: HHID, aggregate: COUNT}

      - database: analytics
        table: hh_master
        name: "Total Households"
        visualization_type: Big Number
        required_columns: [HHID]
        metric: {column: HHID, aggregate: COUNT}

      - database: analytics
        table: hh_master
        name: "Households by Religion"
        visualization_type: Pie Chart
        required_columns: [Religion_of_HH_Head_label, HHID]
        groupby: [Religion_of_HH_Head_label]
        metric: {column: HHID, aggregate: COUNT}

      - database: analytics
        table: hh_master
        name: "Households by Social Group"
        visualization_type: Bar Chart
        required_columns: [Social_Group_of_HH_Head_label, HHID]
        x_axis: Social_Group_of_HH_Head_label
        emit_filter: true
        metrics:
          - {column: HHID, aggregate: COUNT}
        groupby: []

      - database: analytics
        table: hh_master
        name: "Ration Card Coverage"
        visualization_type: Pie Chart
        required_columns: [Ration_Card_Type_label, HHID]
        groupby: [Ration_Card_Type_label]
        metric: {column: HHID, aggregate: COUNT}

      - database: analytics
        table: vw_state_summary
        name: "Internet Access Rate by State"
        visualization_type: Bar Chart
        required_columns: [state, internet_rate]
        x_axis: state
        metrics:
          - {column: internet_rate, aggregate: AVG}
        groupby: []
        row_limit: 50

      - database: analytics
        table: vw_state_summary
        name: "Average Education Years by State"
        visualization_type: Bar Chart
        required_columns: [state, avg_edu_years]
        x_axis: state
        metrics:
          - {column: avg_edu_years, aggregate: AVG}
        groupby: []
        row_limit: 50

      - database: analytics
        table: vw_food_spend_long
        name: "Average Food Spend by Category"
        visualization_type: Bar Chart
        required_columns: [category, spend]
        x_axis: category
        metrics:
          - {column: spend, aggregate: AVG}
        groupby: []

      - database: analytics
        table: vw_food_spend_heatmap
        name: "Food Spend Heatmap"
        visualization_type: Heatmap
        required_columns: [state, category, avg_spend]
        x_axis: state
        groupby: [category]
        metric: {column: avg_spend, aggregate: AVG}
        row_limit: 1000

      - database: analytics
        table: vw_asset_possession_long
        name: "Asset Ownership by Type"
        visualization_type: Bar Chart
        required_columns: [asset, owned]
        x_axis: asset
        metrics:
          - {column: owned, aggregate: AVG}
        groupby: []

      - database: analytics
        table: vw_asset_ownership_heatmap
        name: "Asset Ownership Heatmap"
        visualization_type: Heatmap
        required_columns: [state, asset, ownership_rate]
        x_axis: state
        groupby: [asset]
        metric: {column: ownership_rate, aggregate: AVG}
        row_limit: 1000

      - database: analytics
        table: vw_income_source_flow
        name: "Income Source to Sector Flow"
        visualization_type: Sankey
        required_columns: [source, target, hh_count]
        source: source
        target: target
        metric: {column: hh_count, aggregate: SUM}

      - database: analytics
        table: vw_district_summary
        name: "Households by District (Summary)"
        visualization_type: Bar Chart
        required_columns: [district, hh_count]
        x_axis: district
        metrics:
          - {column: hh_count, aggregate: SUM}
        groupby: []
        row_limit: 75

      - database: analytics
        table: vw_welfare_summary
        name: "Welfare Coverage by State"
        visualization_type: Bar Chart
        required_columns: [state, ayushman_rate, lpg_subsidy_rate, ration_rate]
        x_axis: state
        metrics:
          - {column: ayushman_rate, aggregate: AVG}
          - {column: lpg_subsidy_rate, aggregate: AVG}
          - {column: ration_rate, aggregate: AVG}
        groupby: []
        row_limit: 50

      - database: analytics
        table: vw_digital_adoption
        name: "Digital Adoption by Sector"
        visualization_type: Bar Chart
        required_columns: [sector, internet_rate, online_grocery_rate]
        x_axis: sector
        metrics:
          - {column: internet_rate, aggregate: AVG}
          - {column: online_grocery_rate, aggregate: AVG}
        groupby: []

      - database: analytics
        table: vw_digital_adoption
        name: "Online Services Adoption"
        visualization_type: Bar Chart
        required_columns: [state, online_medicine_rate, online_education_rate]
        x_axis: state
        metrics:
          - {column: online_medicine_rate, aggregate: AVG}
          - {column: online_education_rate, aggregate: AVG}
        groupby: []
        row_limit: 50
