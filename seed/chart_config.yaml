        row_limit: 20
        width: 12
        height: 48

      - header: "Custom Rural Segments Grid (Handlebars)"

      - database: analytics
        table: vw_rural_segment_matrix
        name: "Rural Segments Comparison Grid"
        viz_type: handlebars
        required_columns: [state, segment, segment_class, segment_order, size_pct, hh_count, cereal_spend, cereal_spend_pct, internet_pct, mobile_pct, avg_edu_years, edu_pct, no_digital_pct, scst_pct, large_hh_pct, pmgky_pct, ayushman_pct, ration_pct]
        # Handlebars chart needs all display columns in groupby
        groupby: [segment]
        columns:
          - segment_class
          - segment_order
          - size_pct
          - hh_count
          - cereal_spend
          - cereal_spend_pct
          - internet_pct
          - mobile_pct
          - avg_edu_years
          - edu_pct
          - no_digital_pct
          - scst_pct
          - large_hh_pct
          - pmgky_pct
          - ayushman_pct
          - ration_pct
        # Add metric for proper aggregation
        metric: {column: hh_count, aggregate: SUM}
        row_limit: 100
        width: 12
        height: 72
        handlebars_template: |
          <div class="rural-segments-dashboard">
            <div class="main-header">Rural Segments Comparison</div>
            <div class="category-headers">
              <div class="cat-header size-header">SIZE</div>
              <div class="cat-header economic-header">ECONOMIC CONDITION</div>
              <div class="cat-header digital-header">DIGITAL CONNECTIVITY</div>
              <div class="cat-header human-header">HUMAN CAPITAL</div>
              <div class="cat-header welfare-header">WELFARE & VULNERABILITY</div>
            </div>
            <div class="sub-headers-row">
              <div class="sub-col segment-col">Segment</div>
              <div class="sub-col metric-col">Size (%)</div>
              <div class="sub-col metric-col">Food<br>spend >50%</div>
              <div class="sub-col metric-col">Edu<br>spend >5%</div>
              <div class="sub-col metric-col">High<br>internet use</div>
              <div class="sub-col metric-col">No digital<br>connect</div>
              <div class="sub-col metric-col">SC/ST<br>compos.</div>
              <div class="sub-col metric-col">HH size<br>>5</div>
              <div class="sub-col metric-col">Has<br>PMGKY</div>
              <div class="sub-col metric-col">Ayushman<br>card</div>
              <div class="sub-col metric-col">Ration<br>card</div>
            </div>
            {{#each data}}
            <div class="data-row {{this.segment_class}}">
              <div class="segment-label">
                <div class="seg-name">{{this.segment}}</div>
                <div class="seg-id">R{{this.segment_order}}</div>
              </div>
              <div class="size-cell">
                <div class="mini-pie" style="--pct: {{this.size_pct}};">
                  <span class="pie-label">{{this.size_pct}}%</span>
                </div>
              </div>
              <div class="metric-bar-cell">
                <div class="bar-bg">
                  <div class="bar-fill food-bar" style="width: {{this.cereal_spend_pct}}%;"></div>
                  <span class="bar-text">{{this.cereal_spend_pct}}%</span>
                </div>
              </div>
              <div class="metric-bar-cell">
                <div class="bar-bg">
                  <div class="bar-fill edu-bar" style="width: {{this.edu_pct}}%;"></div>
                  <span class="bar-text">{{this.edu_pct}}%</span>
                </div>
              </div>
              <div class="metric-bar-cell">
                <div class="bar-bg">
                  <div class="bar-fill internet-bar" style="width: {{this.internet_pct}}%;"></div>
                  <span class="bar-text">{{this.internet_pct}}%</span>
                </div>
              </div>
              <div class="metric-bar-cell">
                <div class="bar-bg">
                  <div class="bar-fill no-digital-bar" style="width: {{this.no_digital_pct}}%;"></div>
                  <span class="bar-text">{{this.no_digital_pct}}%</span>
                </div>
              </div>
              <div class="metric-value">{{this.scst_pct}}%</div>
              <div class="metric-bar-cell">
                <div class="bar-bg">
                  <div class="bar-fill hhsize-bar" style="width: {{this.large_hh_pct}}%;"></div>
                  <span class="bar-text">{{this.large_hh_pct}}%</span>
                </div>
              </div>
              <div class="metric-value welfare-val">{{this.pmgky_pct}}%</div>
              <div class="metric-value welfare-val">{{this.ayushman_pct}}%</div>
              <div class="metric-value welfare-val">{{this.ration_pct}}%</div>
            </div>
            {{/each}}
          </div>
        css_styles: |
          .rural-segments-dashboard {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
          }
          .main-header {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e9ecef;
          }
          .category-headers {
            display: grid;
            grid-template-columns: 120px 80px 240px 160px 120px 200px;
            gap: 2px;
            margin-bottom: 2px;
          }
          .cat-header {
            padding: 10px 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            color: white;
            border-radius: 4px 4px 0 0;
          }
          .size-header { background: #6c757d; }
          .economic-header { background: #0d6efd; }
          .digital-header { background: #198754; }
          .human-header { background: #6f42c1; }
          .welfare-header { background: #fd7e14; }
          .sub-headers-row {
            display: grid;
            grid-template-columns: 120px 80px repeat(9, 1fr);
            gap: 4px;
            padding: 8px 4px;
            background: #f1f3f4;
            border-radius: 0 0 4px 4px;
            margin-bottom: 8px;
          }
          .sub-col {
            font-size: 9px;
            font-weight: 600;
            color: #495057;
            text-align: center;
            line-height: 1.3;
          }
          .segment-col {
            text-align: left;
            padding-left: 8px;
          }
          .data-row {
            display: grid;
            grid-template-columns: 120px 80px repeat(9, 1fr);
            gap: 4px;
            padding: 12px 4px;
            border-bottom: 1px solid #e9ecef;
            align-items: center;
          }
          .data-row:last-child {
            border-bottom: none;
          }
          .segment-label {
            padding-left: 8px;
          }
          .seg-name {
            font-weight: 700;
            font-size: 13px;
            color: #212529;
          }
          .seg-id {
            font-size: 10px;
            color: #6c757d;
            margin-top: 2px;
          }
          .size-cell {
            display: flex;
            justify-content: center;
            align-items: center;
          }
          .mini-pie {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ff6b6b calc(var(--pct) * 3.6deg), #e9ecef 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
          }
          .mini-pie::before {
            content: '';
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 50%;
            position: absolute;
          }
          .pie-label {
            font-size: 9px;
            font-weight: 700;
            color: #212529;
            position: relative;
            z-index: 1;
          }
          .metric-bar-cell {
            display: flex;
            justify-content: center;
          }
          .bar-bg {
            width: 100%;
            max-width: 60px;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
          }
          .bar-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            border-radius: 10px;
          }
          .food-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); }
          .edu-bar { background: linear-gradient(90deg, #0d6efd, #74c0fc); }
          .internet-bar { background: linear-gradient(90deg, #198754, #40c057); }
          .no-digital-bar { background: linear-gradient(90deg, #495057, #adb5bd); }
          .hhsize-bar { background: linear-gradient(90deg, #6f42c1, #9775fa); }
          .bar-text {
            position: relative;
            z-index: 1;
            font-size: 10px;
            font-weight: 700;
            color: #212529;
          }
          .metric-value {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            color: #495057;
          }
          .welfare-val {
            color: #e8590c;
          }
          .rural-stable .seg-name { color: #495057; }
          .rural-aspirant .seg-name { color: #fd7e14; }
          .rural-disconnected .seg-name { color: #6f42c1; }
          .rural-constrained .seg-name { color: #212529; }

      - header: "Drill Down — Individual Households by Segment"

      - database: analytics
        table: vw_rural_segments
        name: "Households by Segment Detail"
        viz_type: table
        required_columns: [hhid, segment, state, district, sector, social_group]
        all_columns: [hhid, segment, state, district, sector, social_group, hh_size, avg_edu_years, internet_access, mobile_ownership, car_ownership, online_grocery, ayushman_beneficiary, ration_received, cereal_spend]
        row_limit: 100
        width: 12
        height: 56
