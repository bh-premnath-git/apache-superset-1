# ── Dashboard & Chart Definitions ─────────────────────────────────────────────
# To add a new table/view's charts:
#   1. Drop a seed SQL file in seed/pg/ or seed/mysql/
#      (put business logic — weighting, bucketing, rollups — in SQL *views*,
#       not in this YAML or in Python)
#   2. Register the table or view in seed/import_datasources.yaml
#   3. Add chart entries below — no Python changes needed.
#
# Chart layer rule of thumb: point charts at analytical VIEWS (segment_summary,
# state_summary, income_distribution, …) rather than the raw fact table. Views
# own the business semantics, so charts stay thin and consistent.
#
# Supported viz_type values:
#   echarts_timeseries_bar, echarts_timeseries_line  → time-series (needs x_axis + time_grain + metrics[])
#   echarts_timeseries_bar                           → bar chart (time or categorical x_axis; needs x_axis + metrics[])
#   pie                                              → pie/donut (needs groupby[] + metric{})
#   world_map                                        → geo map (needs entity + country_fieldtype + metric{})
#
# Optional per-chart fields:
#   required_columns: [col1, col2]  → validated before chart creation
#   row_limit: 10000                → default 10000

dashboards:

  - title: "Starter Seed Dashboard"
    slug: starter-seed-dashboard
    charts:

      # ── Sales (MySQL) ────────────────────────────────────────────────────────
      - database: sales
        table: orders
        name: "Sales Amount by Day (Bar)"
        viz_type: echarts_timeseries_bar
        required_columns: [order_date, amount]
        x_axis: order_date
        time_grain: P1D
        metrics:
          - {column: amount, aggregate: SUM}
        groupby: []

      - database: sales
        table: products
        name: "Products by Category (Pie)"
        viz_type: pie
        required_columns: [id, category]
        groupby: [category]
        metric: {column: id, aggregate: COUNT}

      - database: sales
        table: customers
        name: "Customers by Country (Geo)"
        viz_type: world_map
        required_columns: [id, country]
        entity: country
        country_fieldtype: cca2
        metric: {column: id, aggregate: COUNT}
        show_bubbles: true
        max_bubble_size: "25"
        color_by_metric: true

      # ── Analytics (Postgres) ─────────────────────────────────────────────────
      - database: analytics
        table: daily_active_users
        name: "Daily Active Users (Line)"
        viz_type: echarts_timeseries_line
        required_columns: [date, dau]
        x_axis: date
        time_grain: P1D
        metrics:
          - {column: dau, aggregate: SUM}
        groupby: []

      # ── Household Survey: Distributions ──────────────────────────────────────
      # Pie over raw table — simple categorical slice, no weighting.
      - database: analytics
        table: household
        name: "Households by Social Category (Pie)"
        viz_type: pie
        required_columns: [household_id, social_category]
        groupby: [social_category]
        metric: {column: household_id, aggregate: COUNT}

      # Histogram-style bar over a pre-bucketed view.
      - database: analytics
        table: income_distribution
        name: "Income Distribution (Bar)"
        viz_type: echarts_timeseries_bar
        required_columns: [income_bucket, households]
        x_axis: income_bucket
        metrics:
          - {column: households, aggregate: SUM}
        groupby: []

      # ── Household Survey: Comparisons (weighted, via views) ──────────────────
      - database: analytics
        table: segment_summary
        name: "Households by Segment (Bar)"
        viz_type: echarts_timeseries_bar
        required_columns: [segment, households]
        x_axis: segment
        metrics:
          - {column: households, aggregate: SUM}
        groupby: []

      - database: analytics
        table: segment_summary
        name: "Weighted Income by Segment (Bar)"
        viz_type: echarts_timeseries_bar
        required_columns: [segment, weighted_income]
        x_axis: segment
        metrics:
          - {column: weighted_income, aggregate: SUM}
        groupby: []

      - database: analytics
        table: segment_summary
        name: "Internet Penetration by Segment (Bar)"
        viz_type: echarts_timeseries_bar
        required_columns: [segment, internet_pct]
        x_axis: segment
        metrics:
          - {column: internet_pct, aggregate: SUM}
        groupby: []

      # ── Household Survey: Geography (state rollup) ───────────────────────────
      - database: analytics
        table: state_summary
        name: "Households by State (Bar)"
        viz_type: echarts_timeseries_bar
        required_columns: [state, households]
        x_axis: state
        metrics:
          - {column: households, aggregate: SUM}
        groupby: []

      - database: analytics
        table: state_summary
        name: "Weighted Income by State (Bar)"
        viz_type: echarts_timeseries_bar
        required_columns: [state, weighted_income]
        x_axis: state
        metrics:
          - {column: weighted_income, aggregate: SUM}
        groupby: []

      # ── Household Survey: Time-series ────────────────────────────────────────
      - database: analytics
        table: household_monthly_trend
        name: "Monthly Household Creation (Line)"
        viz_type: echarts_timeseries_line
        required_columns: [month, households]
        x_axis: month
        time_grain: P1M
        metrics:
          - {column: households, aggregate: SUM}
        groupby: []

      - database: analytics
        table: household_monthly_trend
        name: "Monthly Avg Income Trend (Line)"
        viz_type: echarts_timeseries_line
        required_columns: [month, avg_income]
        x_axis: month
        time_grain: P1M
        metrics:
          - {column: avg_income, aggregate: SUM}
        groupby: []
