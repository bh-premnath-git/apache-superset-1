dashboards:
  - title: "LCA Household Structure"
    slug: lca-household-structure
    native_filters:
      - name: "Segment Band"
        column: segment_band
        targets: [vw_segment_minor_structure]
        multi_select: true
    charts:
      - header: "Mean Number of Minor in HH"

      - database: analytics
        table: vw_sector_minor_mean_rural
        name: "Household Structure Mean Minors Rural"
        visualization_type: Big Number
        required_columns: [mean_u15]
        metric: {column: mean_u15, aggregate: AVG, label: "Rural"}
        number_format: ".1f"
        width: 3
        height: 16

      - database: analytics
        table: vw_sector_minor_mean_urban
        name: "Household Structure Mean Minors Urban"
        visualization_type: Big Number
        required_columns: [mean_u15]
        metric: {column: mean_u15, aggregate: AVG, label: "Urban"}
        number_format: ".1f"
        width: 3
        height: 16

      - header: "Household Structure - Proportion of Minor (< 15 yrs) (Weighted)"

      - database: analytics
        table: vw_segment_minor_structure
        name: "Household Structure Proportion of Minors by Segment"
        visualization_type: Bar Chart
        required_columns: [segment, minor_bucket, pct_of_segment]
        x_axis: segment
        metrics:
          - {column: pct_of_segment, aggregate: SUM, label: "Percentage of Households (%)"}
        groupby: [minor_bucket]
        stack: "Stack"
        show_legend: true
        show_value: true
        legendOrientation: right
        rich_tooltip: true
        y_axis_title: "Percentage of Households (%)"
        x_axis_title: "Segment"
        y_axis_format: ".0f"
        row_limit: 500
        width: 12
        height: 60
