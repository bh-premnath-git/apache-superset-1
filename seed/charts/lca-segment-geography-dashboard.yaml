dashboards:
  - title: "LCA Segment Geography"
    slug: lca-segment-geography
    native_filters:
      - name: "State"
        column: state
        targets:
          - vw_state_segment_summary
          - vw_state_segment_long
          - vw_district_segment_pie
          - vw_household_segments
      - name: "State ISO"
        column: iso_code
        targets:
          - vw_state_segment_summary
          - vw_state_segment_long
          - vw_district_segment_pie
          - vw_household_segments
    charts:
      - database: analytics
        table: vw_state_segment_summary
        name: "Segment Geo Total Households"
        visualization_type: Big Number
        required_columns: [hh_count]
        metric: {column: hh_count, aggregate: SUM}
        number_format: ".3s"
        width: 3
        height: 16

      - database: analytics
        table: vw_state_segment_summary
        name: "Segment Geo Rural Households"
        visualization_type: Big Number
        required_columns: [rural_count]
        metric: {column: rural_count, aggregate: SUM}
        number_format: ".3s"
        width: 3
        height: 16

      - database: analytics
        table: vw_state_segment_summary
        name: "Segment Geo Urban Households"
        visualization_type: Big Number
        required_columns: [urban_count]
        metric: {column: urban_count, aggregate: SUM}
        number_format: ".3s"
        width: 3
        height: 16

      - database: analytics
        table: vw_state_segment_summary
        name: "Segment Geo District Count"
        visualization_type: Big Number
        required_columns: [district_count]
        metric: {column: district_count, aggregate: SUM}
        number_format: ",d"
        width: 3
        height: 16

      - database: analytics
        table: vw_state_segment_summary
        name: "Segment Geo State Choropleth"
        visualization_type: Country Map
        required_columns: [iso_code, hh_count]
        select_country: india
        entity: iso_code
        metric: {column: hh_count, aggregate: SUM}
        linear_color_scheme: oranges
        cross_filter_source: true
        row_limit: 50
        width: 6
        height: 60

      - database: analytics
        table: vw_state_segment_long
        name: "Segment Geo Segment Distribution by State"
        visualization_type: Bar Chart
        required_columns: [state, segment, hh_count]
        x_axis: state
        metrics:
          - {column: hh_count, aggregate: SUM}
        groupby: [segment]
        cross_filter_target: "Segment Geo State Choropleth"
        row_limit: 300
        width: 6
        height: 60

      - header: "Proportion of Segments by District"

      - database: analytics
        table: vw_district_segment_pie
        name: "Segment Geo District Pie Grid"
        viz_type: handlebars
        required_columns:
          - state
          - iso_code
          - district
          - hh_count
          - r1_pct
          - r2_pct
          - r3_pct
          - r4_pct
          - u1_pct
          - u2_pct
          - u3_pct
          - c1
          - c2
          - c3
          - c4
          - c5
          - c6
        groupby: [state, iso_code, district]
        columns:
          - hh_count
          - r1_pct
          - r2_pct
          - r3_pct
          - r4_pct
          - u1_pct
          - u2_pct
          - u3_pct
          - c1
          - c2
          - c3
          - c4
          - c5
          - c6
        metric: {column: hh_count, aggregate: SUM}
        cross_filter_target: "Segment Geo State Choropleth"
        row_limit: 1500
        width: 12
        height: 96
        handlebars_template: |
          <style>
          .sg-wrap {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff;
            padding: 8px 4px 4px;
          }
          .sg-legend-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            padding: 6px 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 12px;
            font-size: 11px;
            color: #334155;
          }
          .sg-legend-row .sg-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
          }
          .sg-chip-sw {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
          }
          .sg-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
            padding: 0 6px 10px;
          }
          .sg-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
          }
          .sg-state {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #64748b;
          }
          .sg-district {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            margin-top: 3px;
            text-align: center;
            line-height: 1.2;
          }
          .sg-count {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 2px;
          }
          .sg-pie {
            width: 108px;
            height: 108px;
            border-radius: 50%;
            margin: 10px 0 8px;
            box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
          }
          .sg-legend {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px 6px;
            font-size: 9.5px;
            color: #334155;
            width: 100%;
          }
          .sg-legend .sg-chip {
            display: flex;
            align-items: center;
            gap: 4px;
          }
          .sg-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            display: inline-block;
            flex-shrink: 0;
          }
          .sg-r1 { background: #fed7aa; }
          .sg-r2 { background: #fb923c; }
          .sg-r3 { background: #ea580c; }
          .sg-r4 { background: #9a3412; }
          .sg-u1 { background: #bfdbfe; }
          .sg-u2 { background: #60a5fa; }
          .sg-u3 { background: #1d4ed8; }
          </style>
          <div class="sg-wrap">
            <div class="sg-legend-row">
              <span class="sg-chip"><span class="sg-chip-sw sg-r1"></span>R1 Rural Stable</span>
              <span class="sg-chip"><span class="sg-chip-sw sg-r2"></span>R2 Rural Aspirant</span>
              <span class="sg-chip"><span class="sg-chip-sw sg-r3"></span>R3 Rural Disconnected</span>
              <span class="sg-chip"><span class="sg-chip-sw sg-r4"></span>R4 Rural Constrained</span>
              <span class="sg-chip"><span class="sg-chip-sw sg-u1"></span>U1 Urban Stable</span>
              <span class="sg-chip"><span class="sg-chip-sw sg-u2"></span>U2 Urban Aspirant</span>
              <span class="sg-chip"><span class="sg-chip-sw sg-u3"></span>U3 Urban Constrained</span>
            </div>
            <div class="sg-grid">
              {{#each data}}
              <div class="sg-card">
                <div class="sg-state">{{state}}</div>
                <div class="sg-district">{{district}}</div>
                <div class="sg-count">{{hh_count}} households</div>
                <div class="sg-pie" style="background: conic-gradient(#fed7aa 0% {{c1}}%, #fb923c {{c1}}% {{c2}}%, #ea580c {{c2}}% {{c3}}%, #9a3412 {{c3}}% {{c4}}%, #bfdbfe {{c4}}% {{c5}}%, #60a5fa {{c5}}% {{c6}}%, #1d4ed8 {{c6}}% 100%);"></div>
                <div class="sg-legend">
                  <span class="sg-chip"><span class="sg-dot sg-r1"></span>R1 {{r1_pct}}%</span>
                  <span class="sg-chip"><span class="sg-dot sg-r2"></span>R2 {{r2_pct}}%</span>
                  <span class="sg-chip"><span class="sg-dot sg-r3"></span>R3 {{r3_pct}}%</span>
                  <span class="sg-chip"><span class="sg-dot sg-r4"></span>R4 {{r4_pct}}%</span>
                  <span class="sg-chip"><span class="sg-dot sg-u1"></span>U1 {{u1_pct}}%</span>
                  <span class="sg-chip"><span class="sg-dot sg-u2"></span>U2 {{u2_pct}}%</span>
                  <span class="sg-chip"><span class="sg-dot sg-u3"></span>U3 {{u3_pct}}%</span>
                </div>
              </div>
              {{/each}}
            </div>
          </div>
        css_styles: |
