# ── Shared network ────────────────────────────────────────────────────────────
networks:
  superset-net:
    driver: bridge
  bh-keycloak-net:
    external: true
    name: ${KEYCLOAK_EXTERNAL_NETWORK:-shared_network}

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  metadata-db-data:
  redis-data:
  analytics-db-data:
  superset-home:

# ── Re-usable anchor: MCP-specific env (merged on top of *superset-env) ──────
x-mcp-env: &mcp-env
  MCP_DEV_USERNAME:       ${MCP_DEV_USERNAME:-${SUPERSET_ADMIN_USERNAME:-admin}}
  MCP_AUTH_ENABLED:       ${MCP_AUTH_ENABLED:-False}
  MCP_JWT_ALGORITHM:      ${MCP_JWT_ALGORITHM:-RS256}
  MCP_JWT_ISSUER:         ${MCP_JWT_ISSUER:-}
  MCP_JWT_AUDIENCE:       ${MCP_JWT_AUDIENCE:-}
  MCP_JWKS_URI:           ${MCP_JWKS_URI:-}
  MCP_JWT_SECRET:         ${MCP_JWT_SECRET:-}

# ── Re-usable anchor for Superset env vars ────────────────────────────────────
x-superset-env: &superset-env
  SUPERSET_SECRET_KEY:      ${SUPERSET_SECRET_KEY}
  SUPERSET_ADMIN_USERNAME:  ${SUPERSET_ADMIN_USERNAME}
  SUPERSET_ADMIN_PASSWORD:  ${SUPERSET_ADMIN_PASSWORD}
  SUPERSET_ADMIN_EMAIL:     ${SUPERSET_ADMIN_EMAIL}
  SUPERSET_APP_NAME:        ${SUPERSET_APP_NAME:-BigHammer}
  SUPERSET_APP_ICON:        ${SUPERSET_APP_ICON:-/static/assets/images/logo.svg}
  SUPERSET_APP_FAVICON:     ${SUPERSET_APP_FAVICON:-/static/assets/images/logo.svg}
  METADATA_DB_USER:         ${METADATA_DB_USER}
  METADATA_DB_PASS:         ${METADATA_DB_PASS}
  METADATA_DB_NAME:         ${METADATA_DB_NAME}
  METADATA_DB_HOST:         ${METADATA_DB_HOST}
  METADATA_DB_PORT:         ${METADATA_DB_PORT}
  REDIS_HOST:               ${REDIS_HOST}
  REDIS_PORT:               ${REDIS_PORT}
  ANALYTICS_DB_USER:        ${ANALYTICS_DB_USER:-sample_user}
  ANALYTICS_DB_PASS:        ${ANALYTICS_DB_PASS:-sample_pass}
  ANALYTICS_DB_NAME:        ${ANALYTICS_DB_NAME:-analytics}
  ANALYTICS_DB_HOST:        ${ANALYTICS_DB_HOST:-analytics-db}
  ANALYTICS_DB_PORT:        ${ANALYTICS_DB_PORT:-5432}
  ANALYTICS_DB_URI:         ${ANALYTICS_DB_URI:-postgresql+psycopg2://sample_user:sample_pass@analytics-db:5432/analytics}
  MAPBOX_API_KEY:           ${MAPBOX_API_KEY:-}
  KEYCLOAK_SERVER_URL:      ${KEYCLOAK_SERVER_URL:-}
  KEYCLOAK_REALM:           ${KEYCLOAK_REALM:-}
  KEYCLOAK_CLIENT_ID:       ${KEYCLOAK_CLIENT_ID:-}
  KEYCLOAK_CLIENT_SECRET:   ${KEYCLOAK_CLIENT_SECRET:-}
  KEYCLOAK_REDIRECT_URI:    ${KEYCLOAK_REDIRECT_URI:-}
  KEYCLOAK_API_BASE_URL:    ${KEYCLOAK_API_BASE_URL:-}
  SUPERSET_CONFIG_PATH:     /app/pythonpath/superset_config.py
  PYTHONPATH:               /app/pythonpath
  SUPERSET_URL:             ${SUPERSET_URL:-http://superset:8088}
  SUPERSET_API_TIMEOUT:     ${SUPERSET_API_TIMEOUT:-120}

services:

  # NOTE: viz plugins (e.g. state_district_pies) are now compiled into the
  # Superset SPA bundle by the frontend-builder stage of ./Dockerfile, so
  # there is no runtime plugin-builder service. Source lives in
  # ``superset-plugins/`` and is statically registered into MainPreset.ts at
  # image build time — see ``docker/frontend-build/register-plugin.mjs``.

  # ── Extension builder (one-shot) ────────────────────────────────────────────
  # Builds the dashboard-chatbot extension into a .supx package for the
  # Superset Extensions framework. Outputs to extensions/bundles/.
  #
  # NOTE: Extensions are lifecycle:development (upstream 6.x). The API may 404.
  #   This builder prepares the package; registration depends on upstream fixes.
  extension-builder:
    build:
      context: ./superset-extensions/dashboard-chatbot
      dockerfile: Dockerfile.builder
    container_name: superset-extension-builder
    restart: "no"
    volumes:
      - ./extensions/bundles:/output
    networks:
      - superset-net
    # NOTE: This is a one-shot builder; it builds the .supx bundle and exits.
    # The reconciler auto-discovers the bundle from extensions/bundles/.

  # ── Extension builder: home-shell (one-shot) ───────────────────────────────
  # Builds the India Segmentation Home Shell extension (Pathways-style left
  # sidebar that replaces the Welcome page, keeping the top nav). Outputs the
  # .supx to extensions/bundles/, where the reconciler auto-discovers it and
  # exports HOME_SHELL_SUPX_PATH for the runtime seeder.
  extension-builder-home-shell:
    build:
      context: ./superset-extensions/home-shell
      dockerfile: Dockerfile.builder
    container_name: superset-extension-builder-home-shell
    restart: "no"
    volumes:
      - ./extensions/bundles:/output
    networks:
      - superset-net

  # ── Superset metadata DB ───────────────────────────────────────────────────
  metadata-db:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    container_name: superset-metadata-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${METADATA_DB_USER:-superset}
      POSTGRES_PASSWORD: ${METADATA_DB_PASS:-superset}
      POSTGRES_DB:       ${METADATA_DB_NAME:-superset}
    volumes:
      # Postgres 18+ requires mount at /var/lib/postgresql (not /data subdir)
      # See: https://github.com/docker-library/postgres/issues/37
      - metadata-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METADATA_DB_USER:-superset} -d ${METADATA_DB_NAME:-superset}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - superset-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: superset-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - superset-net

  # ── Superset web ───────────────────────────────────────────────────────────
  superset-init:
    image: apache-superset-1-superset:local
    pull_policy: never
    container_name: superset-init
    restart: "no"
    depends_on:
      metadata-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      analytics-db:
        condition: service_healthy
    environment:
      <<: *superset-env
    entrypoint: ["/app/init.sh"]
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
      - ./keycloak_oidc_dynamic.py:/app/pythonpath/keycloak_oidc_dynamic.py:ro
      - ./seed:/app/seed:ro
    networks:
      - superset-net
      - bh-keycloak-net

  # ── Superset web ───────────────────────────────────────────────────────────
  #
  # The ``superset`` service is the canonical builder for the Superset
  # image (with our viz plugin baked in). Every other service that needs
  # this image references ``image: apache-superset-1-superset:local``
  # rather than redeclaring ``build:`` — so ``docker compose build`` runs
  # the heavy frontend build exactly once.
  superset:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUPERSET_BASE_IMAGE: ${SUPERSET_BASE_IMAGE:-apache/superset:6.1.0rc2}
    image: apache-superset-1-superset:local
    pull_policy: build
    container_name: superset-app
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      <<: *superset-env
    ports:
      - "8088:8088"
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
      - ./keycloak_oidc_dynamic.py:/app/pythonpath/keycloak_oidc_dynamic.py:ro
      - ./extensions/bundles:/app/extensions:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - superset-net
      - bh-keycloak-net

  # ── Celery worker ──────────────────────────────────────────────────────────
  celery-worker:
    image: apache-superset-1-superset:local
    pull_policy: never
    container_name: superset-celery-worker
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      <<: *superset-env
    entrypoint: ["celery", "--app=superset.tasks.celery_app:app", "worker",
                 "--loglevel=info", "--pool=prefork", "--max-tasks-per-child=128"]
    healthcheck:
      disable: true
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
      - ./keycloak_oidc_dynamic.py:/app/pythonpath/keycloak_oidc_dynamic.py:ro
    networks:
      - superset-net
      - bh-keycloak-net

  # ── Celery beat (scheduled tasks) ─────────────────────────────────────────
  celery-beat:
    image: apache-superset-1-superset:local
    pull_policy: never
    container_name: superset-celery-beat
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      <<: *superset-env
    entrypoint: ["celery", "--app=superset.tasks.celery_app:app", "beat",
                 "--loglevel=info", "--schedule=/app/superset_home/celerybeat-schedule"]
    healthcheck:
      disable: true
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
      - ./keycloak_oidc_dynamic.py:/app/pythonpath/keycloak_oidc_dynamic.py:ro
    networks:
      - superset-net
      - bh-keycloak-net

  # ── Sample Analytics Postgres DB ───────────────────────────────────────────
  analytics-db:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    container_name: superset-analytics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${ANALYTICS_DB_USER:-sample_user}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASS:-sample_pass}
      POSTGRES_DB:       ${ANALYTICS_DB_NAME:-analytics}
    ports:
      - "5433:5432"
    volumes:
      # Postgres 18+ requires mount at /var/lib/postgresql (not /data subdir)
      - analytics-db-data:/var/lib/postgresql
      - ./seed/pg:/docker-entrypoint-initdb.d:ro
    # The postgres official entrypoint runs everything in
    # /docker-entrypoint-initdb.d on a temporary local socket *before* the
    # real server starts listening — so `pg_isready` returning success
    # already guarantees the init SQL (schema + views + CSV COPY) has
    # completed. A more specific query-based check is redundant and, when
    # the seed data is unavailable (e.g. Git LFS not pulled), would keep
    # the container "unhealthy" forever and mask the real cause. The seed
    # SQL itself now degrades gracefully on a missing/pointer CSV.
    # `start_period` is generous because the 316 MB COPY can take ~1-2 min.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER:-sample_user} -d ${ANALYTICS_DB_NAME:-analytics}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - superset-net

  # ── MCP server (built-in Superset ``superset mcp run`` CLI) ───────────────
  #
  # Runs alongside the Superset web container, shares the same image and
  # superset_config.py, and exposes the Model Context Protocol over HTTP at
  # ${MCP_PORT}.  Auth mode is env-driven (see README §6.4).
  mcp:
    image: apache-superset-1-superset:local
    pull_policy: never
    container_name: superset-mcp
    restart: unless-stopped
    depends_on:
      superset:
        condition: service_healthy
    environment:
      <<: [*superset-env, *mcp-env]
    entrypoint:
      - superset
      - mcp
      - run
      - --host
      - 0.0.0.0
      - --port
      - "${MCP_PORT:-5008}"
    ports:
      - "${MCP_PORT:-5008}:${MCP_PORT:-5008}"
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
      - ./keycloak_oidc_dynamic.py:/app/pythonpath/keycloak_oidc_dynamic.py:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import socket,sys,os; s=socket.socket();
          s.settimeout(2);
          sys.exit(0 if s.connect_ex(('127.0.0.1', int(os.environ.get('MCP_PORT','5008'))))==0 else 1)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - superset-net
      - bh-keycloak-net

  # ── Runtime REST seeding ───────────────────────────────────────────────────
  superset-runtime-seed:
    image: apache-superset-1-superset:local
    pull_policy: never
    container_name: superset-runtime-seed
    restart: unless-stopped
    depends_on:
      superset:
        condition: service_healthy
      analytics-db:
        condition: service_healthy
      extension-builder:
        condition: service_completed_successfully
      extension-builder-home-shell:
        condition: service_completed_successfully
    environment:
      <<: *superset-env
    entrypoint: ["/app/docker/scripts/reconciler_entrypoint.sh"]
    healthcheck:
      disable: true
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
      - ./keycloak_oidc_dynamic.py:/app/pythonpath/keycloak_oidc_dynamic.py:ro
      - ./assets:/app/assets
      - ./extensions/bundles:/app/extensions:ro
    networks:
      - superset-net
      - bh-keycloak-net
