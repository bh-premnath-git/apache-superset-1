# ── Shared network ────────────────────────────────────────────────────────────
networks:
  superset-net:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  metadata-db-data:
  redis-data:
  analytics-db-data:
  superset-home:
  keycloak-db-data:
  keycloak-ssl:

# ── Re-usable anchor: MCP-specific env (merged on top of *superset-env) ──────
x-mcp-env: &mcp-env
  MCP_DEV_USERNAME:       ${MCP_DEV_USERNAME:-${SUPERSET_ADMIN_USERNAME:-admin}}
  MCP_AUTH_ENABLED:       ${MCP_AUTH_ENABLED:-False}
  MCP_JWT_ALGORITHM:      ${MCP_JWT_ALGORITHM:-RS256}
  MCP_JWT_ISSUER:         ${MCP_JWT_ISSUER:-}
  MCP_JWT_AUDIENCE:       ${MCP_JWT_AUDIENCE:-}
  MCP_JWKS_URI:           ${MCP_JWKS_URI:-}
  MCP_JWT_SECRET:         ${MCP_JWT_SECRET:-}

# ── Re-usable anchor for Superset env vars ────────────────────────────────────
x-superset-env: &superset-env
  SUPERSET_SECRET_KEY:      ${SUPERSET_SECRET_KEY}
  SUPERSET_ADMIN_USERNAME:  ${SUPERSET_ADMIN_USERNAME}
  SUPERSET_ADMIN_PASSWORD:  ${SUPERSET_ADMIN_PASSWORD}
  SUPERSET_ADMIN_EMAIL:     ${SUPERSET_ADMIN_EMAIL}
  SUPERSET_APP_NAME:        ${SUPERSET_APP_NAME:-BigHammer}
  SUPERSET_APP_ICON:        ${SUPERSET_APP_ICON:-/static/assets/images/logo.svg}
  SUPERSET_APP_FAVICON:     ${SUPERSET_APP_FAVICON:-/static/assets/images/logo.svg}
  METADATA_DB_USER:         ${METADATA_DB_USER}
  METADATA_DB_PASS:         ${METADATA_DB_PASS}
  METADATA_DB_NAME:         ${METADATA_DB_NAME}
  METADATA_DB_HOST:         ${METADATA_DB_HOST}
  METADATA_DB_PORT:         ${METADATA_DB_PORT}
  REDIS_HOST:               ${REDIS_HOST}
  REDIS_PORT:               ${REDIS_PORT}
  ANALYTICS_DB_USER:        ${ANALYTICS_DB_USER:-sample_user}
  ANALYTICS_DB_PASS:        ${ANALYTICS_DB_PASS:-sample_pass}
  ANALYTICS_DB_NAME:        ${ANALYTICS_DB_NAME:-analytics}
  ANALYTICS_DB_HOST:        ${ANALYTICS_DB_HOST:-analytics-db}
  ANALYTICS_DB_PORT:        ${ANALYTICS_DB_PORT:-5432}
  ANALYTICS_DB_URI:         ${ANALYTICS_DB_URI:-postgresql+psycopg2://sample_user:sample_pass@analytics-db:5432/analytics}
  MAPBOX_API_KEY:           ${MAPBOX_API_KEY:-}
  KEYCLOAK_SERVER_URL:      ${KEYCLOAK_SERVER_URL:-}
  KEYCLOAK_REALM:           ${KEYCLOAK_REALM:-}
  KEYCLOAK_CLIENT_ID:       ${KEYCLOAK_CLIENT_ID:-}
  KEYCLOAK_CLIENT_SECRET:   ${KEYCLOAK_CLIENT_SECRET:-}
  KEYCLOAK_REDIRECT_URI:    ${KEYCLOAK_REDIRECT_URI:-}
  KEYCLOAK_API_BASE_URL:    ${KEYCLOAK_API_BASE_URL:-}
  SUPERSET_CONFIG_PATH:     /app/pythonpath/superset_config.py
  PYTHONPATH:               /app/pythonpath
  SUPERSET_URL:             ${SUPERSET_URL:-http://superset:8088}
  SUPERSET_API_TIMEOUT:     ${SUPERSET_API_TIMEOUT:-120}

x-keycloak-env: &keycloak-env
  KEYCLOAK_ADMIN:                 ${KEYCLOAK_ADMIN:-admin}
  KEYCLOAK_ADMIN_PASSWORD:        ${KEYCLOAK_ADMIN_PASSWORD:-password}
  KC_DB:                          postgres
  KC_DB_URL:                      jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
  KC_DB_USERNAME:                 ${KEYCLOAK_DB_USER:-keycloak}
  KC_DB_PASSWORD:                 ${KEYCLOAK_DB_PASS:-keycloak}
  KC_PROXY_HEADERS:               xforwarded
  KC_HTTP_ENABLED:                true
  KC_HEALTH_ENABLED:              true
  KC_HOSTNAME:                    http://${KEYCLOAK_HOSTNAME:-localhost}:8080
  KC_HOSTNAME_BACKCHANNEL_DYNAMIC: true
  KEYCLOAK_INTERNAL_URL:          http://keycloak:8080
  KEYCLOAK_BOOTSTRAP_USERNAME:    ${KEYCLOAK_BOOTSTRAP_USERNAME:-superset-user}
  KEYCLOAK_BOOTSTRAP_PASSWORD:    ${KEYCLOAK_BOOTSTRAP_PASSWORD:-superset123}
  KEYCLOAK_BOOTSTRAP_EMAIL:       ${KEYCLOAK_BOOTSTRAP_EMAIL:-superset@example.com}
  KEYCLOAK_BOOTSTRAP_ROLE:        ${KEYCLOAK_BOOTSTRAP_ROLE:-superset_admin}
  KEYCLOAK_ROLE_CLAIM:            ${KEYCLOAK_ROLE_CLAIM:-role_keys}

services:

  # ── Superset metadata DB ───────────────────────────────────────────────────
  metadata-db:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    container_name: superset-metadata-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${METADATA_DB_USER}
      POSTGRES_PASSWORD: ${METADATA_DB_PASS}
      POSTGRES_DB:       ${METADATA_DB_NAME}
    volumes:
      - metadata-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METADATA_DB_USER} -d ${METADATA_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - superset-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: superset-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - superset-net

  # ── Keycloak metadata DB ────────────────────────────────────────────────────
  keycloak-db:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    container_name: superset-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASS:-keycloak}
      POSTGRES_DB:       ${KEYCLOAK_DB_NAME:-keycloak}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - superset-net

  # ── Keycloak ────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: superset-keycloak
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      <<: *keycloak-env
    command: ["start-dev"]
    networks:
      - superset-net

  # ── Keycloak nginx proxy ────────────────────────────────────────────────────
  keycloak-nginx:
    build:
      context: .
      dockerfile: docker/keycloak-nginx/Dockerfile
    container_name: superset-keycloak-nginx
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_started
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - keycloak-ssl:/etc/nginx/ssl
    networks:
      - superset-net

  # ── Keycloak bootstrap ──────────────────────────────────────────────────────
  keycloak-bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUPERSET_BASE_IMAGE: ${SUPERSET_BASE_IMAGE:-apache/superset:6.0.0}
    container_name: superset-keycloak-bootstrap
    restart: "no"
    depends_on:
      keycloak:
        condition: service_started
    environment:
      <<: [*superset-env, *keycloak-env]
    entrypoint: ["python", "/app/docker/scripts/bootstrap_keycloak.py"]
    networks:
      - superset-net

  # ── Superset web ───────────────────────────────────────────────────────────
  superset-init:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUPERSET_BASE_IMAGE: ${SUPERSET_BASE_IMAGE:-apache/superset:6.0.0}
    container_name: superset-init
    restart: "no"
    depends_on:
      metadata-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      analytics-db:
        condition: service_healthy
      keycloak-bootstrap:
        condition: service_completed_successfully
    environment:
      <<: *superset-env
    entrypoint: ["/app/init.sh"]
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
      - ./seed:/app/seed:ro
    networks:
      - superset-net

  # ── Superset web ───────────────────────────────────────────────────────────
  superset:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUPERSET_BASE_IMAGE: ${SUPERSET_BASE_IMAGE:-apache/superset:6.0.0}
    container_name: superset-app
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      <<: *superset-env
    ports:
      - "8088:8088"
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - superset-net

  # ── Celery worker ──────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUPERSET_BASE_IMAGE: ${SUPERSET_BASE_IMAGE:-apache/superset:6.0.0}
    container_name: superset-celery-worker
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      <<: *superset-env
    entrypoint: ["celery", "--app=superset.tasks.celery_app:app", "worker",
                 "--loglevel=info", "--pool=prefork", "--max-tasks-per-child=128"]
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
    networks:
      - superset-net

  # ── Celery beat (scheduled tasks) ─────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUPERSET_BASE_IMAGE: ${SUPERSET_BASE_IMAGE:-apache/superset:6.0.0}
    container_name: superset-celery-beat
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      <<: *superset-env
    entrypoint: ["celery", "--app=superset.tasks.celery_app:app", "beat",
                 "--loglevel=info", "--schedule=/app/superset_home/celerybeat-schedule"]
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
    networks:
      - superset-net

  # ── Sample Analytics Postgres DB ───────────────────────────────────────────
  analytics-db:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    container_name: superset-analytics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${ANALYTICS_DB_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASS}
      POSTGRES_DB:       ${ANALYTICS_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - analytics-db-data:/var/lib/postgresql/data
      - ./seed/pg:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          psql -U ${ANALYTICS_DB_USER} -d ${ANALYTICS_DB_NAME} -tAc
          "SELECT CASE
          WHEN to_regclass('household.hh_master') IS NOT NULL
           AND to_regclass('household.vw_hh_segments') IS NOT NULL
           AND EXISTS (SELECT 1 FROM household.hh_master LIMIT 1)
          THEN 1 ELSE 0 END"
          | grep -q 1
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - superset-net

  # ── MCP server (built-in Superset ``superset mcp run`` CLI) ───────────────
  #
  # Runs alongside the Superset web container, shares the same image and
  # superset_config.py, and exposes the Model Context Protocol over HTTP at
  # ${MCP_PORT}.  Auth mode is env-driven (see README §6.4).
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUPERSET_BASE_IMAGE: ${SUPERSET_BASE_IMAGE:-apache/superset:6.1.0rc2}
    container_name: superset-mcp
    restart: unless-stopped
    depends_on:
      superset:
        condition: service_healthy
    environment:
      <<: [*superset-env, *mcp-env]
    entrypoint:
      - superset
      - mcp
      - run
      - --host
      - 0.0.0.0
      - --port
      - "${MCP_PORT:-5008}"
    ports:
      - "${MCP_PORT:-5008}:${MCP_PORT:-5008}"
    volumes:
      - superset-home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import socket,sys,os; s=socket.socket();
          s.settimeout(2);
          sys.exit(0 if s.connect_ex(('127.0.0.1', int(os.environ.get('MCP_PORT','5008'))))==0 else 1)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - superset-net

  # ── Runtime REST seeding ───────────────────────────────────────────────────
  superset-runtime-seed:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUPERSET_BASE_IMAGE: ${SUPERSET_BASE_IMAGE:-apache/superset:6.0.0}
    container_name: superset-runtime-seed
    restart: unless-stopped
    depends_on:
      superset:
        condition: service_healthy
      analytics-db:
        condition: service_healthy
    environment:
      <<: *superset-env
    entrypoint: ["python", "-u", "/app/docker/scripts/seed_dashboard.py"]
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./custom_sso_security_manager.py:/app/pythonpath/custom_sso_security_manager.py:ro
      - ./assets:/app/assets
    networks:
      - superset-net
