# Cartodiagram chart: per-district pie sub-chart plotted at the district
# centroid for the selected state. `selectedChartRef` is resolved by
# ChartReconciler into Cartodiagram's doubly-encoded `selected_chart`
# field. Geometry column is GeoJSON Point from
# household.vw_state_district_segment_geo.
apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.district_pie_bihar
  name: 'Bihar: Proportion of Segments by District'
spec:
  datasetRef: dataset.household.state_district_segment_geo
  vizType: cartodiagram
  selectedChartRef: chart.household.district_pie_subchart
  params:
    viz_type: cartodiagram
    geom_column: geometry
    adhoc_filters:
    - clause: WHERE
      expressionType: SQL
      sqlExpression: state_label = 'Bihar'
    row_limit: 10000
    map_view:
      mode: FIT_DATA
      zoom: 6
      latitude: 23.0
      longitude: 82.0
      fixedZoom: 6
      fixedLatitude: 23.0
      fixedLongitude: 82.0
    layer_configs:
    - type: XYZ
      url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
      title: OpenStreetMap
      attribution: © OpenStreetMap contributors
    chart_background_color:
      r: 255
      g: 255
      b: 255
      a: 0.2
    chart_background_border_radius: 10
    chart_size:
      type: FIXED
      configs:
        zoom: 6
        width: 80
        height: 80
        slope: 30
        exponent: 2
      values:
        '0':
          width: 80
          height: 80
        '1':
          width: 80
          height: 80
