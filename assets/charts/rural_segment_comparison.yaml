apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.rural_segment_comparison
  name: Rural Segments Comparison
spec:
  datasetRef: dataset.household.hh_master
  vizType: handlebars
  params:
    query_mode: aggregate
    row_limit: 50
    order_desc: true
    adhoc_filters:
      - expressionType: SQL
        clause: WHERE
        sqlExpression: '"Sector" = 1'
    groupby:
      - label: segment
        expressionType: SQL
        optionName: ac_segment
        sqlExpression: |-
          CASE "Household_Type"
            WHEN 1 THEN 'Rural Self-Employed Agri'
            WHEN 2 THEN 'Rural Self-Employed Non-Agri'
            WHEN 3 THEN 'Rural Regular Wage'
            WHEN 4 THEN 'Rural Casual Labour Agri'
            WHEN 5 THEN 'Rural Casual Labour Non-Agri'
            WHEN 6 THEN 'Rural Other'
            ELSE 'Rural Unclassified'
          END
    metrics:
      - label: size_pct
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_size_pct
        sqlExpression: 'ROUND((COUNT(*) * 100.0 / NULLIF(SUM(COUNT(*)) OVER (), 0))::numeric, 1)'
      - label: food_spend_gt_50
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_food_spend_gt_50
        sqlExpression: |-
          ROUND((AVG(
            CASE
              WHEN (
                COALESCE(cereal_val_total,0) + COALESCE(pulses_val_total,0) +
                COALESCE(dairy_val_total,0) + COALESCE(vegetables_val_total,0) +
                COALESCE(egg_fish_meat_val_total,0) + COALESCE("edible oil_val_total",0) +
                COALESCE(spices_val_total,0) + COALESCE(suger_salt_val_total,0) +
                COALESCE(beverages_val_total,0)
              ) / NULLIF(
                COALESCE(cereal_val_total,0) + COALESCE(pulses_val_total,0) +
                COALESCE(dairy_val_total,0) + COALESCE(vegetables_val_total,0) +
                COALESCE(egg_fish_meat_val_total,0) + COALESCE("edible oil_val_total",0) +
                COALESCE(spices_val_total,0) + COALESCE(suger_salt_val_total,0) +
                COALESCE(beverages_val_total,0) +
                COALESCE("subtotal fuel and light_val_total",0) +
                COALESCE("edu expense_val_total",0) +
                COALESCE(conveyance_val_total,0) +
                COALESCE(entertainment_val_total,0) +
                COALESCE(internet_val_total,0) +
                COALESCE(clothing_val_total,0) +
                COALESCE(footwear_val_total,0) +
                COALESCE("house_garage rent_val_total",0) +
                COALESCE("medical nonhospitalized_val_total",0),
                0
              ) > 0.5 THEN 1.0 ELSE 0.0
            END
          ) * 100)::numeric, 1)
      - label: edu_spend_gt_5
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_edu_spend_gt_5
        sqlExpression: |-
          ROUND((AVG(
            CASE
              WHEN COALESCE("edu expense_val_total",0) / NULLIF(
                COALESCE(cereal_val_total,0) + COALESCE(pulses_val_total,0) +
                COALESCE(dairy_val_total,0) + COALESCE(vegetables_val_total,0) +
                COALESCE(egg_fish_meat_val_total,0) + COALESCE("edible oil_val_total",0) +
                COALESCE("subtotal fuel and light_val_total",0) +
                COALESCE("edu expense_val_total",0) +
                COALESCE(conveyance_val_total,0) +
                COALESCE(entertainment_val_total,0) +
                COALESCE(internet_val_total,0) +
                COALESCE(clothing_val_total,0) +
                COALESCE("house_garage rent_val_total",0),
                0
              ) > 0.05 THEN 1.0 ELSE 0.0
            END
          ) * 100)::numeric, 1)
      - label: mcpe_inr
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_mcpe_inr
        sqlExpression: |-
          ROUND(AVG(
            (
              COALESCE(cereal_val_total,0) + COALESCE(pulses_val_total,0) +
              COALESCE(dairy_val_total,0) + COALESCE(vegetables_val_total,0) +
              COALESCE(egg_fish_meat_val_total,0) + COALESCE("edible oil_val_total",0) +
              COALESCE(spices_val_total,0) + COALESCE(suger_salt_val_total,0) +
              COALESCE(beverages_val_total,0) +
              COALESCE("subtotal fuel and light_val_total",0) +
              COALESCE("edu expense_val_total",0) +
              COALESCE(conveyance_val_total,0) +
              COALESCE("house_garage rent_val_total",0) +
              COALESCE("medical nonhospitalized_val_total",0) +
              COALESCE(entertainment_val_total,0) +
              COALESCE(internet_val_total,0) +
              COALESCE(clothing_val_total,0) +
              COALESCE(footwear_val_total,0)
            ) / NULLIF(hh_size, 0)
          )::numeric, 0)
      - label: family_internet_use
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_family_internet_use
        sqlExpression: 'ROUND((AVG(COALESCE(any_internet, 0)::numeric) * 100)::numeric, 1)'
      - label: high_online_connect
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_high_online_connect
        sqlExpression: 'ROUND((AVG(CASE WHEN COALESCE(prop_internet_users, 0) >= 0.5 THEN 1.0 ELSE 0.0 END) * 100)::numeric, 1)'
      - label: no_digital_purchase
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_no_digital_purchase
        sqlExpression: |-
          ROUND((AVG(
            CASE
              WHEN ("Online_Groceries" IS NULL OR "Online_Groceries" IN ('NA',''))
               AND ("Online_Milk" IS NULL OR "Online_Milk" IN ('NA',''))
               AND ("Online_Vegetables" IS NULL OR "Online_Vegetables" IN ('NA',''))
               AND ("Online_Fresh_Fruits" IS NULL OR "Online_Fresh_Fruits" IN ('NA',''))
               AND ("Online_Clothing" IS NULL OR "Online_Clothing" IN ('NA',''))
               AND ("Online_Mobile" IS NULL OR "Online_Mobile" IN ('NA',''))
               AND ("Online_purchase_medicine" IS NULL OR "Online_purchase_medicine" IN ('NA',''))
              THEN 1.0 ELSE 0.0
            END
          ) * 100)::numeric, 1)
      - label: scst_compos
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_scst_compos
        sqlExpression: 'ROUND((AVG(CASE WHEN "Social_Group_of_HH_Head" IN (1, 2) THEN 1.0 ELSE 0.0 END) * 100)::numeric, 1)'
      - label: uhs_minors_gt_3
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_uhs_minors_gt_3
        sqlExpression: 'ROUND((AVG(CASE WHEN COALESCE(n_children_u15, 0) > 3 THEN 1.0 ELSE 0.0 END) * 100)::numeric, 1)'
      - label: hh_size_gt_6
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_hh_size_gt_6
        sqlExpression: 'ROUND((AVG(CASE WHEN COALESCE(hh_size, 0) > 6 THEN 1.0 ELSE 0.0 END) * 100)::numeric, 1)'
      - label: has_pmgky
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_has_pmgky
        sqlExpression: 'ROUND((AVG(CASE WHEN "Benefitted_From_PMGKY" = 1 THEN 1.0 ELSE 0.0 END) * 100)::numeric, 1)'
      - label: ayushman_card
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_ayushman_card
        sqlExpression: 'ROUND((AVG(CASE WHEN "Ayushman_beneficiary" = 1 THEN 1.0 ELSE 0.0 END) * 100)::numeric, 1)'
      - label: ration_card
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_ration_card
        sqlExpression: 'ROUND((AVG(CASE WHEN COALESCE("Ration_Card_Type", 0) > 0 THEN 1.0 ELSE 0.0 END) * 100)::numeric, 1)'
    handlebarsTemplate: |-
      <div class="rsc-root">
        <table class="rsc-table">
          <thead>
            <tr class="rsc-cat-row">
              <th class="rsc-seg-head"></th>
              <th class="rsc-cat rsc-cat-size" colspan="1">SIZE</th>
              <th class="rsc-cat rsc-cat-econ" colspan="3">ECONOMIC CONDITION</th>
              <th class="rsc-cat rsc-cat-digi" colspan="3">DIGITAL CONNECTIVITY</th>
              <th class="rsc-cat rsc-cat-cap"  colspan="3">HUMAN CAPITAL</th>
              <th class="rsc-cat rsc-cat-wel"  colspan="3">WELFARE &amp; VULNERABILITY</th>
            </tr>
            <tr class="rsc-col-row">
              <th class="rsc-seg-head">Segment</th>
              <th>Size (%)</th>
              <th>Food<br/>spend &gt;50%</th>
              <th>Edu<br/>spend &gt;5%</th>
              <th>MCPE<br/>(INR)</th>
              <th>Family<br/>internet use</th>
              <th>High online<br/>connect.</th>
              <th>No digital<br/>purchase</th>
              <th>SC-ST<br/>compos.</th>
              <th>UHS minors<br/>&gt;3</th>
              <th>HH size<br/>&gt;6</th>
              <th>Has<br/>PMGKY</th>
              <th>Ayushman<br/>card</th>
              <th>Ration<br/>card</th>
            </tr>
          </thead>
          <tbody>
            {{#each data}}
            <tr class="rsc-data-row">
              <td class="rsc-seg">
                <div class="rsc-seg-name">{{this.segment}}</div>
                <div class="rsc-seg-tier">R2</div>
              </td>
              <td class="rsc-cell rsc-num-size">
                <div class="rsc-val">{{this.size_pct}}%</div>
                <div class="rsc-bar rsc-bar-size"><span style="width: {{this.size_pct}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-econ">
                <div class="rsc-val">{{this.food_spend_gt_50}}%</div>
                <div class="rsc-bar rsc-bar-econ"><span style="width: {{this.food_spend_gt_50}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-econ">
                <div class="rsc-val">{{this.edu_spend_gt_5}}%</div>
                <div class="rsc-bar rsc-bar-econ"><span style="width: {{this.edu_spend_gt_5}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-econ">
                <div class="rsc-val">₹{{this.mcpe_inr}}</div>
              </td>
              <td class="rsc-cell rsc-num-digi">
                <div class="rsc-val">{{this.family_internet_use}}%</div>
                <div class="rsc-bar rsc-bar-digi"><span style="width: {{this.family_internet_use}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-digi">
                <div class="rsc-val">{{this.high_online_connect}}%</div>
                <div class="rsc-bar rsc-bar-digi"><span style="width: {{this.high_online_connect}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-digi">
                <div class="rsc-val">{{this.no_digital_purchase}}%</div>
                <div class="rsc-bar rsc-bar-digi-muted"><span style="width: {{this.no_digital_purchase}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-cap">
                <div class="rsc-val">{{this.scst_compos}}%</div>
                <div class="rsc-bar rsc-bar-cap"><span style="width: {{this.scst_compos}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-cap">
                <div class="rsc-val">{{this.uhs_minors_gt_3}}%</div>
                <div class="rsc-bar rsc-bar-cap"><span style="width: {{this.uhs_minors_gt_3}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-cap">
                <div class="rsc-val">{{this.hh_size_gt_6}}%</div>
                <div class="rsc-bar rsc-bar-cap"><span style="width: {{this.hh_size_gt_6}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-wel">
                <div class="rsc-val">{{this.has_pmgky}}%</div>
                <div class="rsc-bar rsc-bar-wel"><span style="width: {{this.has_pmgky}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-wel">
                <div class="rsc-val">{{this.ayushman_card}}%</div>
                <div class="rsc-bar rsc-bar-wel"><span style="width: {{this.ayushman_card}}%"></span></div>
              </td>
              <td class="rsc-cell rsc-num-wel">
                <div class="rsc-val">{{this.ration_card}}%</div>
                <div class="rsc-bar rsc-bar-wel"><span style="width: {{this.ration_card}}%"></span></div>
              </td>
            </tr>
            {{/each}}
          </tbody>
        </table>
      </div>
    styleTemplate: |-
      .rsc-root { font-family: Inter, Arial, sans-serif; padding: 8px 4px; overflow-x: auto; }
      .rsc-table { border-collapse: collapse; width: 100%; font-size: 12px; color: #222; }
      .rsc-table thead th { padding: 8px 10px; font-weight: 600; text-align: center; }
      .rsc-cat-row th { color: #fff; text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; border-right: 2px solid #fff; }
      .rsc-cat-size { background: #6b6e7a; }
      .rsc-cat-econ { background: #1565d8; }
      .rsc-cat-digi { background: #1f8f5c; }
      .rsc-cat-cap  { background: #6e3bb6; }
      .rsc-cat-wel  { background: #9a3b1a; }
      .rsc-col-row th { color: #4a4a4a; background: #f5f6f8; font-weight: 500; font-size: 11px; border-bottom: 1px solid #e2e4e8; padding: 8px 10px; }
      .rsc-seg-head { text-align: left !important; background: #f5f6f8 !important; color: #4a4a4a; }
      .rsc-data-row td { padding: 14px 10px; border-bottom: 1px solid #edeef1; text-align: center; vertical-align: middle; }
      .rsc-seg { text-align: left !important; min-width: 160px; }
      .rsc-seg-name { color: #e8772e; font-weight: 700; font-size: 14px; }
      .rsc-seg-tier { color: #f0a774; font-size: 11px; letter-spacing: 0.05em; margin-top: 2px; }
      .rsc-cell { min-width: 78px; }
      .rsc-val { font-weight: 600; font-size: 13px; color: #222; }
      .rsc-bar { height: 4px; background: #eceef2; border-radius: 2px; margin-top: 6px; overflow: hidden; }
      .rsc-bar span { display: block; height: 100%; border-radius: 2px; }
      .rsc-bar-size span { background: #6b6e7a; }
      .rsc-bar-econ span { background: #1565d8; }
      .rsc-bar-digi span { background: #1f8f5c; }
      .rsc-bar-digi-muted span { background: #cfd3dc; }
      .rsc-bar-cap  span { background: #6e3bb6; }
      .rsc-bar-wel  span { background: #9a3b1a; }
      .rsc-num-wel .rsc-val { color: #9a3b1a; }
