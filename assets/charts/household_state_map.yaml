apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.state_map
  name: Households by State
spec:
  datasetRef: dataset.household.hh_master
  vizType: country_map
  params:
    viz_type: country_map
    # ── Entity column ────────────────────────────────────────────────
    # The Country Map plugin matches the entity value against the
    # GeoJSON feature's `ISO` property (see CountryMap.ts in
    # legacy-plugin-chart-country-map). For india.geojson the ISO
    # values are ISO 3166-2:IN codes (IN-BR, IN-MP, ...), not NAME_1
    # state names. Using NAME_1 here produces a blank outline-only map
    # because no feature matches, so every region falls through to the
    # default 'none' fill. The `state_iso_code` column is populated by
    # 002_household_hh_master.sql with the correct ISO codes.
    entity: state_iso_code
    metric:
      expressionType: SIMPLE
      column:
        column_name: HHID
        type: string
      aggregate: COUNT
      label: Total Households
    row_limit: 100
    linear_color_scheme: superset_seq_1
    number_format: SMART_NUMBER
    adhoc_filters:
      - clause: WHERE
        expressionType: SQL
        sqlExpression: 'state_iso_code IS NOT NULL'
    # Country Map control key is `select_country` and values are lowercase
    # slugs (see apache/superset legacy-plugin-chart-country-map countries.ts).
    select_country: india

  description: |
    Interactive map of India showing household counts by state.
    Click any state to filter the Rural Segments Comparison table.
