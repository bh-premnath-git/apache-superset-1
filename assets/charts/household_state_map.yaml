apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.state_map
  name: Households by State
spec:
  datasetRef: dataset.household.hh_master
  vizType: country_map
  params:
    viz_type: country_map
    # ── Entity column ────────────────────────────────────────────────
    # The Country Map plugin matches on the GeoJSON NAME_1 property.
    # Our DB State_label values differ from the GeoJSON names (e.g.
    # "Tamilnadu" vs "Tamil Nadu", "Chattisgarh" vs "Chhattisgarh").
    # The `state_map_name` column is added by 002_household_hh_master.sql
    # with corrected names that match india.geojson exactly.
    entity: state_map_name
    metric:
      expressionType: SIMPLE
      column:
        column_name: HHID
        type: string
      aggregate: COUNT
      label: Total Households
    row_limit: 100
    linear_color_scheme: superset_seq_1
    number_format: SMART_NUMBER
    adhoc_filters:
      - clause: WHERE
        expressionType: SQL
        sqlExpression: 'state_map_name IS NOT NULL'
    # Country Map control key is `select_country` and values are lowercase
    # slugs (see apache/superset legacy-plugin-chart-country-map countries.ts).
    select_country: india

  description: |
    Interactive map of India showing household counts by state.
    Click any state to filter the Rural Segments Comparison table.
