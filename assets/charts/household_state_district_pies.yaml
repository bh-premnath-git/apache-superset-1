apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.state_district_pies
  name: "State + District Segment Pies"
spec:
  datasetRef: dataset.household.state_district_segment

  # vizType here must match the Plugin's `spec.vizType`. Superset will
  # fall back to a broken-chart placeholder if the dynamic plugin bundle
  # is not yet registered — the PluginReconciler skips cleanly when
  # STATE_DISTRICT_PIES_PLUGIN_BUNDLE_URL is unset.
  vizType: state_district_pies
  params:
    viz_type: state_district_pies

    # ── Query binding ───────────────────────────────────────────────
    state_column: state_iso_code
    district_column: district_code
    category_column: segment
    metric:
      expressionType: SIMPLE
      column:
        column_name: hh_weight
        type: double precision
      aggregate: SUM
      label: hh_weight
    row_limit: 10000

    # ── Map sources ─────────────────────────────────────────────────
    # State geojson: Superset already ships india.geojson for its
    # legacy Country Map plugin. The plugin's control takes any URL —
    # operators can swap in a higher-fidelity version.
    state_geojson_url: /static/assets/geojson/india.geojson
    # District geojson must be published separately (see wiki page).
    # The URL is relative to the Superset origin so it works behind the
    # same auth as the UI.
    district_geojson_url: /static/assets/geojson/india-districts.geojson
    state_feature_key_prop: ISO
    district_feature_key_prop: censuscode

    # ── Customize ───────────────────────────────────────────────────
    color_scheme: supersetDefault
    min_pie_radius: 5
    max_pie_radius: 20
    show_legend: true
    show_tooltip: true

  description: |
    Choropleth of Indian states overlaid with a proportional pie per
    district. Wedges show the LCA segment mix (R1–R4 rural, U1–U3 urban)
    and pie radius encodes total household weight in the district.
