apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.segment_distribution_pie
  name: "Distribution of Segments in 3 States [Weighted]"
spec:
  datasetRef: dataset.household.segment_distribution
  vizType: pie
  params:
    viz_type: pie
    row_limit: 10
    groupby:
      - segment
    metric:
      label: weighted_count
      expressionType: SQL
      hasCustomLabel: true
      optionName: am_weighted_share
      # View grain is (state_label, sector_label, segment); re-aggregate
      # to per-segment here. Pie label_type=key_percent computes the %
      # per slice from these sums, so we no longer need the pre-computed
      # pct column the view used to expose. Carrying extra dimensions on
      # the view/dataset turns state_label and sector_label into
      # drill-by pivot targets for this chart.
      sqlExpression: SUM(seg_weight)
    show_legend: true
    legendType: scroll
    legendOrientation: right
    number_format: ",.0f"
    donut: false
    label_type: key_percent
    color_scheme: supersetColors
