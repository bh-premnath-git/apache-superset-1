apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.minor_structure
  name: "Household Structure - Proportion of Minor (< 15 yrs) (Weighted)"
spec:
  datasetRef: dataset.household.segment_minor_bucket
  vizType: echarts_timeseries_bar
  params:
    viz_type: echarts_timeseries_bar
    row_limit: 50
    # View grain is (state_label, sector_label, segment, minor_bucket);
    # re-aggregate to (segment, minor_bucket) here. stack: Expand
    # renders 100%-normalised bars so each segment's bar still totals
    # to 100%, matching the previous "% per segment" visual.
    # state_label / sector_label are carried so drill-by has pivot
    # targets.
    x_axis: segment
    x_axis_sort_asc: true
    groupby:
      - minor_bucket
    metrics:
      - label: weighted_count
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_weighted_pct
        sqlExpression: SUM(bucket_weight)
    stack: Expand
    show_legend: true
    legendType: scroll
    legendOrientation: right
    show_value: true
    y_axis_title: Share of households
    x_axis_title: Segment
    y_axis_format: ".0%"
    rich_tooltip: true
    color_scheme: d3Category10
    order_desc: true
