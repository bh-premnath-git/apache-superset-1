apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.minor_structure
  name: "Household Structure - Proportion of Minor (< 15 yrs) (Weighted)"
spec:
  datasetRef: dataset.household.segment_minor_bucket
  vizType: echarts_timeseries_bar
  params:
    viz_type: echarts_timeseries_bar
    row_limit: 50
    # Rows per (segment, minor_bucket) already sum to 100% per segment,
    # so we just surface them as a stacked bar.
    x_axis: segment
    x_axis_sort_asc: true
    groupby:
      - minor_bucket
    metrics:
      - label: weighted_pct
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_weighted_pct
        sqlExpression: MAX(pct)
    stack: Stack
    show_legend: true
    legendType: scroll
    legendOrientation: right
    show_value: true
    y_axis_title: Percentage of Households (%)
    x_axis_title: Segment
    y_axis_format: ".0f"
    rich_tooltip: true
    color_scheme: d3Category10
    order_desc: true
