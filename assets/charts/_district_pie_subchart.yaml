apiVersion: analytics/v1
kind: Chart
metadata:
  # Leading underscore keeps this sub-chart ordered before the Cartodiagram
  # parent in a single reconcile pass.
  key: chart.household.district_pie_subchart
  name: "District Segment Pie (Cartodiagram sub-chart)"
spec:
  datasetRef: dataset.household.state_district_segment_geo
  vizType: pie
  params:
    viz_type: pie
    groupby:
      - segment
    metric:
      label: hh_weight
      expressionType: SQL
      hasCustomLabel: true
      optionName: am_district_pie_weight
      sqlExpression: SUM(hh_weight)
    row_limit: 1000
    number_format: ".0f"
    donut: false
    show_labels: false
    show_legend: false
    label_type: key
    color_scheme: supersetColors
