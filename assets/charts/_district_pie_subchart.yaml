apiVersion: analytics/v1
kind: Chart
metadata:
  # Leading underscore in the filename ensures this asset sorts ahead of the
  # three Cartodiagram charts that reference it via selectedChartRef, so the
  # sub-chart is created first in a single reconcile pass.
  key: chart.household.district_pie_subchart
  name: "District Segment Pie (Cartodiagram sub-chart)"
spec:
  datasetRef: dataset.household.state_district_segment_geo
  vizType: pie
  params:
    viz_type: pie
    # Cartodiagram auto-prepends geom_column to groupby, so we only list the
    # slice dimension here. Metric is weighted household count per segment.
    groupby:
      - segment
    metric:
      label: hh_weight
      expressionType: SQL
      hasCustomLabel: true
      optionName: am_district_pie_weight
      sqlExpression: SUM(hh_weight)
    row_limit: 1000
    number_format: ".0f"
    donut: false
    # Per-pie legends + labels produce unreadable clutter (All/Inv/1-2/1-3 legend
    # pagination chrome) when ~38-112 sub-charts tile the map. Hide both; the
    # dashboard shows one shared legend via chart.household.segment_distribution_pie
    # and segment colors are stable across all charts via supersetColors.
    # Hover any slice to see the segment name + weighted count via tooltip.
    show_labels: false
    show_legend: false
    label_type: key
    color_scheme: supersetColors
