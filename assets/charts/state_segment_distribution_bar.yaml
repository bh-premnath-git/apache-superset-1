apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.state_segment_distribution_bar
  name: "Segment Distribution within State (Weighted)"
spec:
  datasetRef: dataset.household.state_segment_distribution
  vizType: echarts_timeseries_bar
  params:
    viz_type: echarts_timeseries_bar
    row_limit: 50
    # View grain is (state_label, sector_label, segment); re-aggregate
    # to (state_label, segment) here. stack: Expand renders
    # 100%-normalised bars so each state's bar still totals to 100%,
    # matching the previous "% within state" visual. sector_label is
    # carried purely so drill-by has a pivot target — the bar still
    # shows state × segment.
    x_axis: state_label
    x_axis_sort_asc: true
    groupby:
      - segment
    metrics:
      - label: weighted_count
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_state_seg_pct
        sqlExpression: SUM(seg_weight)
    stack: Expand
    show_legend: true
    legendType: scroll
    legendOrientation: right
    show_value: true
    y_axis_title: Share within State
    x_axis_title: State
    y_axis_format: ".0%"
    rich_tooltip: true
    color_scheme: supersetColors
    order_desc: true
