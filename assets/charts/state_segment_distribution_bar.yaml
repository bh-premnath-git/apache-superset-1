apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.state_segment_distribution_bar
  name: "Segment Distribution within State (Weighted)"
spec:
  datasetRef: dataset.household.state_segment_distribution
  vizType: echarts_timeseries_bar
  params:
    viz_type: echarts_timeseries_bar
    row_limit: 50
    # Rows per (state_label, segment) already store weighted % within state,
    # so stacking the rows produces three 100% columns (one per state).
    x_axis: state_label
    x_axis_sort_asc: true
    groupby:
      - segment
    metrics:
      - label: weighted_pct
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_state_seg_pct
        sqlExpression: MAX(pct)
    stack: Stack
    show_legend: true
    legendType: scroll
    legendOrientation: right
    show_value: true
    y_axis_title: Percentage within State (%)
    x_axis_title: State
    y_axis_format: ".0f"
    rich_tooltip: true
    color_scheme: supersetColors
    order_desc: true
