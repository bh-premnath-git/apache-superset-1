# District Segments by State — rendered by the in-house ``state_district_pies``
# viz plugin, which is statically registered into the Superset SPA bundle by
# the frontend-builder stage of the Dockerfile (see
# docker/frontend-build/register-plugin.mjs).
#
# Why static registration instead of the cartodiagram + dynamic plugin route:
#   - Cartodiagram (chart.household.district_pie_unified, vizType=cartodiagram
#     + a sub-chart) does not expose Behavior.DRILL_BY in upstream metadata,
#     so the dashboard's "drill by everywhere" contract was broken on this
#     tile.
#   - The dynamic plugin path (``/dynamic-plugins/api/read``) returns 404 in
#     Superset 6.0/6.1 even with FEATURE_FLAGS['DYNAMIC_PLUGINS']=True
#     (apache/superset#35870, closed ``not planned``), leaving the SPA stuck
#     in ``loading: true`` forever.
# Static registration sidesteps both: the plugin ChartMetadata declares
# DRILL_TO_DETAIL + DRILL_BY directly, and there is no runtime fetch.
#
# GeoJSON hosting: the india-districts.geojson file at the repo root is
# baked into the runtime image at /app/superset/static/assets/ by the
# Dockerfile, so the browser fetches it from the same origin as the SPA.
# The same file is currently used for both the state layer and the district
# centroids (matched on the GADM ``NAME_1`` / ``NAME_2`` properties); a
# proper state-dissolved GeoJSON can replace ``state_geojson_url`` later
# without touching the chart key.
apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.district_pie_unified
  name: 'District Segments by State'
spec:
  datasetRef: dataset.household.state_district_segment_geo
  vizType: state_district_pies
  params:
    viz_type: state_district_pies
    state_column: state_label
    district_column: district_name
    category_column: segment
    metric:
      label: hh_weight
      expressionType: SQL
      hasCustomLabel: true
      optionName: am_state_district_pies_weight
      sqlExpression: SUM(hh_weight)
    row_limit: 10000
    state_geojson_url: /static/assets/india-districts.geojson
    district_geojson_url: /static/assets/india-districts.geojson
    state_feature_key_prop: NAME_1
    district_feature_key_prop: NAME_2
    color_scheme: supersetColors
    min_pie_radius: 4
    max_pie_radius: 18
    show_legend: true
    show_tooltip: true
    emit_filter: true
