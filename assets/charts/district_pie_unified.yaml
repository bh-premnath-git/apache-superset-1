# Unified Cartodiagram chart: per-district pie sub-chart plotted at district
# centroids. Responds to the dashboard State filter to show one state at a time.
# Defaults to showing all three states (Bihar, Jharkhand, MP) when no filter
# is applied, but the filter UI encourages selection. Geometry from
# household.vw_state_district_segment_geo.
apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.district_pie_unified
  name: 'District Segments by State'
spec:
  datasetRef: dataset.household.state_district_segment_geo
  vizType: cartodiagram
  selectedChartRef: chart.household.district_pie_subchart
  params:
    viz_type: cartodiagram
    geom_column: geometry
    # No hardcoded state filter — controlled by dashboard State filter
    row_limit: 10000
    map_view:
      mode: FIT_DATA
      zoom: 5
      latitude: 24.0
      longitude: 82.0
      fixedZoom: 5
      fixedLatitude: 24.0
      fixedLongitude: 82.0
    layer_configs:
    - type: XYZ
      url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
      title: OpenStreetMap
      attribution: © OpenStreetMap contributors
    chart_background_color:
      r: 255
      g: 255
      b: 255
      a: 0.2
    chart_background_border_radius: 10
    chart_size:
      type: FIXED
      configs:
        zoom: 5
        width: 140
        height: 140
        slope: 30
        exponent: 2
      values:
        '0':
          width: 140
          height: 140
