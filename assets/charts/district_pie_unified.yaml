# District-level segment mix for the state picked in the dashboard's State
# filter. Rendered as a 100% stacked bar (one bar per district, coloured by
# segment) rather than the Cartodiagram + pie sub-chart combination that
# shipped previously.
#
# Why the change?
# ---------------
# Cartodiagram (Superset 6.0) cannot currently render Pie charts as its
# sub-chart: the sub-chart pipeline wraps children in a mock Redux store but
# the Echarts Pie plugin still throws "Cannot read properties of null
# (reading 'store')" when probed for certain selectors. Upstream bug
# https://github.com/apache/superset/issues/34247 — with the pie sub-chart
# in play the Cartodiagram renders a blank panel.
#
# An echarts stacked bar is chosen because:
#   1. It actually renders against vw_state_district_segment_geo as-is.
#   2. Echarts charts natively support "Drill by", "Drill to detail" and
#      cross-filters in Superset 5.x+ — the deck.gl / Cartodiagram maps do
#      not. (See FEATURE_FLAGS DRILL_BY / DRILL_TO_DETAIL in
#      superset_config.py — both force-enabled to satisfy the dashboard's
#      "drill by on every chart" requirement.)
#   3. The dashboard State filter already narrows the view to one state,
#      so ~24–50 bars is legible at dashboard width with 45° label rotation.
apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.district_pie_unified
  name: 'District Segments by State'
spec:
  datasetRef: dataset.household.state_district_segment_geo
  vizType: echarts_timeseries_bar
  params:
    viz_type: echarts_timeseries_bar
    row_limit: 5000
    x_axis: district_name
    x_axis_sort_asc: true
    groupby:
      - segment
    metrics:
      - label: hh_weight
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_district_hh_weight
        sqlExpression: SUM(hh_weight)
    # Stack bars so every district column sums to the district's total
    # weighted household count, and the slice heights read as segment mix.
    stack: Stack
    show_legend: true
    legendType: scroll
    legendOrientation: top
    show_value: false
    y_axis_title: Weighted Households
    x_axis_title: District
    y_axis_format: ".2s"
    x_axis_label_rotation: 45
    rich_tooltip: true
    color_scheme: supersetColors
    order_desc: false
