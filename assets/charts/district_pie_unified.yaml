# Unified Cartodiagram chart: per-district pie sub-chart plotted at district
# centroids. Responds to the dashboard State filter to show one state at a time.
# Defaults (in the dashboard) to Bihar so ~38 districts render instead of all
# 112 at once. Geometry from household.vw_state_district_segment_geo.
#
# Superset 6.1.0 RC note:
# - Upstream issue #34247 (Cartodiagram + pie) was closed on 2025-10-07.
# - This chart intentionally uses a dedicated pie sub-chart with labels/legend
#   disabled to avoid tiled legend clutter while preserving hover tooltips.
apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.district_pie_unified
  name: 'District Segments by State'
spec:
  datasetRef: dataset.household.state_district_segment_geo
  vizType: cartodiagram
  selectedChartRef: chart.household.district_pie_subchart
  params:
    viz_type: cartodiagram
    geom_column: geometry
    row_limit: 10000
    map_view:
      mode: FIT_DATA
      zoom: 6
      latitude: 24.0
      longitude: 82.0
      fixedZoom: 6
      fixedLatitude: 24.0
      fixedLongitude: 82.0
    layer_configs:
      - type: XYZ
        url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
        title: OpenStreetMap
        attribution: © OpenStreetMap contributors
    chart_background_color:
      r: 255
      g: 255
      b: 255
      a: 1.0
    chart_background_border_radius: 4
    chart_size:
      type: LINEAR
      configs:
        zoom: 6
        width: 55
        height: 55
        slope: 18
        exponent: 1
      values:
        '0': { width: 28, height: 28 }
        '1': { width: 28, height: 28 }
        '2': { width: 30, height: 30 }
        '3': { width: 32, height: 32 }
        '4': { width: 34, height: 34 }
        '5': { width: 40, height: 40 }
        '6': { width: 55, height: 55 }
        '7': { width: 64, height: 64 }
        '8': { width: 73, height: 73 }
        '9': { width: 82, height: 82 }
        '10': { width: 91, height: 91 }
        '11': { width: 100, height: 100 }
        '12': { width: 109, height: 109 }
        '13': { width: 118, height: 118 }
        '14': { width: 127, height: 127 }
        '15': { width: 136, height: 136 }
        '16': { width: 145, height: 145 }
        '17': { width: 154, height: 154 }
        '18': { width: 163, height: 163 }
        '19': { width: 172, height: 172 }
        '20': { width: 181, height: 181 }
        '21': { width: 190, height: 190 }
        '22': { width: 199, height: 199 }
