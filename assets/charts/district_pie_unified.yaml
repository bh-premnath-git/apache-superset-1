# Unified Cartodiagram chart: per-district pie sub-chart plotted at district
# centroids. Responds to the dashboard State filter to show one state at a time.
# Defaults (in the dashboard) to Bihar so ~38 districts render instead of all
# 112 at once. Geometry from household.vw_state_district_segment_geo.
#
# Readability tuning (see wiki/assets/chart.household.district_pie_unified.md):
# - Sub-chart has show_legend:false + show_labels:false to stop per-pie legend
#   chrome (the All/Inv/1-2/1-3 pagination seen when every pie renders its own
#   scroll legend) overlapping across the map.
# - Pie size is LINEAR so pies grow when the user zooms in to a single district.
# - Base tile layer is CARTO Voyager — shows India state + district admin
#   boundaries beneath the pies without requiring a custom plugin or WFS layer.
apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.district_pie_unified
  name: 'District Segments by State'
spec:
  datasetRef: dataset.household.state_district_segment_geo
  vizType: cartodiagram
  selectedChartRef: chart.household.district_pie_subchart
  params:
    viz_type: cartodiagram
    geom_column: geometry
    # No hardcoded state filter — controlled by dashboard State filter (defaults
    # to the first state so a single state's districts render at a time).
    row_limit: 10000
    map_view:
      mode: FIT_DATA
      zoom: 6
      latitude: 24.0
      longitude: 82.0
      fixedZoom: 6
      fixedLatitude: 24.0
      fixedLongitude: 82.0
    layer_configs:
      # CARTO Voyager tiles: OSM-derived but with prominent state and district
      # admin boundaries (the "state outline / district outline" the user asked
      # for). Attribution requires both OSM and CARTO credit lines.
      - type: XYZ
        url: https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png
        title: CARTO Voyager
        attribution: © OpenStreetMap contributors © CARTO
    chart_background_color:
      r: 255
      g: 255
      b: 255
      a: 0.0
    chart_background_border_radius: 4
    # LINEAR size: pies are small at the 3-state overview and grow when the
    # user zooms into one state. At zoom 6 (single-state view) pies are 55 px
    # wide; each additional zoom level adds ~18 px so zoom 9 → ~109 px.
    chart_size:
      type: LINEAR
      configs:
        zoom: 6
        width: 55
        height: 55
        slope: 18
        exponent: 1
