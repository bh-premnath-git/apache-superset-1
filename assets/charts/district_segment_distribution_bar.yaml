# District-level segment breakdown companion chart.
#
# Why this chart exists: the sibling "District Segments by State" chart
# (chart.household.district_pie_unified) uses vizType=cartodiagram, whose
# upstream ChartMetadata does NOT register Behavior.DRILL_BY — so the
# right-click menu on that map only exposes "Drill to detail", never
# "Drill by" (see superset-frontend/plugins/plugin-chart-cartodiagram/
# src/plugin/index.ts on apache/superset master). This chart covers the
# same district × segment slice but uses echarts_timeseries_bar, which
# DOES register DRILL_BY, so the state → district → segment drill-by
# path that the dashboard's "Data exploration story" promises actually
# works here.
#
# Dataset: household.vw_state_district_segment_geo (same view the
# cartodiagram reads) — long-form rows keyed by (state_label,
# district_name, segment) with hh_weight. state_label is filtered by
# the dashboard's State native filter, so the bars collapse to the
# districts of the currently selected state.
apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.district_segment_distribution_bar
  name: 'District Segment Breakdown (Drill-by)'
spec:
  datasetRef: dataset.household.state_district_segment_geo
  vizType: echarts_timeseries_bar
  params:
    viz_type: echarts_timeseries_bar
    row_limit: 500
    x_axis: district_name
    x_axis_sort_asc: true
    groupby:
      - segment
    metrics:
      - label: hh_weight
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_district_seg_weight
        sqlExpression: SUM(hh_weight)
    stack: Stack
    show_legend: true
    legendType: scroll
    legendOrientation: right
    show_value: false
    y_axis_title: Weighted household count
    x_axis_title: District
    y_axis_format: ".0f"
    rich_tooltip: true
    color_scheme: supersetColors
    order_desc: true
