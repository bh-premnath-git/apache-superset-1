# District-level segment breakdown companion chart.
#
# Why this chart exists: it's a 1-D drill-by partner to the sibling map
# chart "District Segments by State" (chart.household.district_pie_unified,
# vizType=state_district_pies). Both read the same long-form view; this
# one renders the (district × segment) slice as a stacked bar so users
# can compare district mixes without map context.
#
# Dataset: household.vw_state_district_segment_geo — long-form rows keyed
# by (state_label, district_name, segment) with hh_weight. state_label is
# filtered by the dashboard's State native filter, so the bars collapse
# to the districts of the currently selected state.
apiVersion: analytics/v1
kind: Chart
metadata:
  key: chart.household.district_segment_distribution_bar
  name: 'District Segment Breakdown (Drill-by)'
spec:
  datasetRef: dataset.household.state_district_segment_geo
  vizType: echarts_timeseries_bar
  params:
    viz_type: echarts_timeseries_bar
    row_limit: 500
    x_axis: district_name
    x_axis_sort_asc: true
    groupby:
      - segment
    metrics:
      - label: hh_weight
        expressionType: SQL
        hasCustomLabel: true
        optionName: am_district_seg_weight
        sqlExpression: SUM(hh_weight)
    stack: Stack
    show_legend: true
    legendType: scroll
    legendOrientation: right
    show_value: false
    y_axis_title: Weighted household count
    x_axis_title: District
    y_axis_format: ".0f"
    rich_tooltip: true
    color_scheme: supersetColors
    order_desc: true
