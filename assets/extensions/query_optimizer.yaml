# ⚠️  ENABLE_EXTENSIONS is lifecycle:development as of Superset 6.0/6.1.
# The /api/v1/extensions/ endpoint and .supx runtime loader are NOT yet
# functional in released builds.  This YAML is a template — the reconciler
# will skip it gracefully until the feature ships.
# Tracking: https://github.com/apache/superset/discussions/38607
#           https://github.com/apache/superset/issues/34162  (SIP-177)
apiVersion: analytics/v1
kind: Extension
metadata:
  key: ext.my_org.query_optimizer
  name: Query Optimizer
spec:
  publisher: my-org
  extensionName: query-optimizer
  version: "1.2.0"
  # Extension bundle path is injected from environment — the .supx file must
  # be built and placed on disk before the reconciler can register it.
  #
  # Workflow to produce a .supx bundle:
  #   1. pip install apache-superset-extensions-cli
  #   2. superset-extensions init  (scaffold frontend + backend)
  #   3. superset-extensions bundle (produces .supx archive)
  #   4. Set QUERY_OPTIMIZER_SUPX_PATH in .env to the hosted path
  #      e.g. /app/extensions/my-org.query-optimizer-1.2.0.supx
  #
  # OR use supxUrlFromEnv to pull from a remote registry:
  #   QUERY_OPTIMIZER_SUPX_URL=https://registry.example.com/extensions/my-org.query-optimizer-1.2.0.supx
  supxPathFromEnv: QUERY_OPTIMIZER_SUPX_PATH
  featureFlag: ENABLE_EXTENSIONS
  permissions:
    - can_read
    - can_write
