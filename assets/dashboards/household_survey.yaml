apiVersion: analytics/v1
kind: Dashboard
metadata:
  key: dashboard.household.survey
  name: Household Survey Overview
spec:
  slug: household-survey
  chartHeight: 55
  # Layout rules:
  # - `fullWidthFirst: 2` → first two charts (Rural Segments table and
  #   District Segments Cartodiagram) each get their own full-width row.
  # - `chartsPerRow: 2` → remaining charts render in two columns per row.
  # - `chartHeights` → per-chart height overrides. The Rural Segments table
  #   and the District Segments map both need extra vertical space;
  #   all other charts use the compact default (55).
  fullWidthFirst: 2
  chartsPerRow: 2
  crossFiltersEnabled: true
  chartHeights:
    chart.household.rural_segment_comparison: 105
    # District-level Cartodiagram height reduced.
    chart.household.district_pie_unified: 70
  chartRefs:
    - chart.household.rural_segment_comparison
    - chart.household.district_pie_unified
    - chart.household.minor_structure
    - chart.household.segment_distribution_pie
    - chart.household.state_segment_distribution_bar
    - chart.household.mpce_by_segment
  # ── Data exploration story (see wiki/assets/dashboard.household.survey.md) ─
  # 1. Native filters narrow the slice (State / Sector / Social Group).
  # 2. Cross-filters propagate clicks: click a district pie in District
  #    Segments by State → it pins the district across the other charts.
  #    Enabled via crossFiltersEnabled.
  # 3. Right-click any echarts / table / pivot-table cell → "Drill to detail"
  #    shows the underlying hh_master rows; "Drill by" pivots to a different
  #    dimension (state → district → segment). Force-enabled dashboard-wide
  #    via FEATURE_FLAGS.DRILL_BY / DRILL_TO_DETAIL in superset_config.py;
  #    no per-chart YAML is required. Upstream exceptions: the Handlebars
  #    viz (Rural Segments table) does not currently expose the context
  #    menu — cross-filters remain the interaction path there.
  #
  # ── Native filters ─────────────────────────────────────────────────────────
  # State filter controls the District Segments Cartodiagram (single select so
  # only one state's districts render at a time, keeping pies readable).
  # defaultToFirstItem=true pins the first alphabetical state (Bihar) on
  # dashboard load so the chart is readable immediately; the user can
  # switch to Jharkhand or Madhya Pradesh via the filter bar.
  #
  # Filter coverage (documented so there are no surprises):
  #   State       → hh_master, state_district_segment_geo
  #   Sector      → hh_master only (other views don't carry Sector_label)
  #   Social Grp  → hh_master only (other views are pre-aggregated by segment)
  # The six LCA views (segment_distribution, segment_minor_bucket,
  # state_segment_distribution, mpce_by_segment) are pre-aggregated and do not
  # currently carry sector/social_group columns; extending the filters to them
  # would require rebuilding those views.
  nativeFilters:
    - key: filter.household.state
      name: State
      filterType: filter_select
      description: >-
        Narrow the District Segments map + Rural Segments table to one
        state. Defaults to Bihar; switch to Jharkhand or Madhya Pradesh via
        this filter. Does not affect the four summary charts (they're
        aggregated across all three states).
      targets:
        - datasetRef: dataset.household.hh_master
          column: State_label
        - datasetRef: dataset.household.state_district_segment_geo
          column: state_label
      controlValues:
        multiSelect: false
        enableEmptyFilter: false
        defaultToFirstItem: true
        inverseSelection: false
        searchAllOptions: false
    - key: filter.household.sector
      name: Sector
      filterType: filter_select
      description: Rural vs. urban households.
      targets:
        - datasetRef: dataset.household.hh_master
          column: Sector_label
      controlValues:
        multiSelect: false
        enableEmptyFilter: false
        defaultToFirstItem: false
        inverseSelection: false
        searchAllOptions: false
    - key: filter.household.social_group
      name: Social group of HH head
      filterType: filter_select
      description: SC / ST / OBC / Others composition of the head of household.
      targets:
        - datasetRef: dataset.household.hh_master
          column: Social_Group_of_HH_Head_label
      controlValues:
        multiSelect: true
        enableEmptyFilter: false
        defaultToFirstItem: false
        inverseSelection: false
        searchAllOptions: false
