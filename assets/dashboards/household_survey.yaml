apiVersion: analytics/v1
kind: Dashboard
metadata:
  key: dashboard.household.survey
  name: Household Survey Overview
spec:
  slug: household-survey
  chartHeight: 55
  # Layout rules:
  # - `fullWidthFirst: 2` → first two charts (Rural Segments table and
  #   District Segments map) each get their own full-width row.
  # - `chartsPerRow: 2` → remaining charts render in two columns per row.
  # - `chartHeights` → per-chart height overrides. Only rural_segment_comparison
  #   is large (data-dense table). All others use compact height.
  fullWidthFirst: 2
  chartsPerRow: 2
  crossFiltersEnabled: true
  chartHeights:
    chart.household.rural_segment_comparison: 120
  chartRefs:
    - chart.household.rural_segment_comparison
    - chart.household.district_pie_unified
    - chart.household.minor_structure
    - chart.household.segment_distribution_pie
    - chart.household.state_segment_distribution_bar
    - chart.household.mpce_by_segment
  # Cross-filtering enabled via crossFiltersEnabled.
  #
  # ── Dashboard-level native filters ─────────────────────────────────────────
  # The State filter now controls the unified district pie chart (defaults to
  # Bihar when no selection). Filter matching is by column NAME on the target
  # dataset — the unified chart uses state_district_segment_geo which has
  # state_label for filtering.
  nativeFilters:
    - key: filter.household.state
      name: State
      filterType: filter_select
      description: Filter districts by state. Defaults to Bihar.
      targets:
        - datasetRef: dataset.household.hh_master
          column: State_label
        - datasetRef: dataset.household.state_district_segment_geo
          column: state_label
      controlValues:
        multiSelect: false
        enableEmptyFilter: false
        defaultToFirstItem: false
        inverseSelection: false
        searchAllOptions: false
    - key: filter.household.sector
      name: Sector
      filterType: filter_select
      description: Rural vs. urban households.
      targets:
        - datasetRef: dataset.household.hh_master
          column: Sector_label
      controlValues:
        multiSelect: false
        enableEmptyFilter: false
        defaultToFirstItem: false
        inverseSelection: false
        searchAllOptions: false
    - key: filter.household.social_group
      name: Social group of HH head
      filterType: filter_select
      description: SC / ST / OBC / Others composition of the head of household.
      targets:
        - datasetRef: dataset.household.hh_master
          column: Social_Group_of_HH_Head_label
      controlValues:
        multiSelect: true
        enableEmptyFilter: false
        defaultToFirstItem: false
        inverseSelection: false
        searchAllOptions: false
