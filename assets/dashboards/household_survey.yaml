apiVersion: analytics/v1
kind: Dashboard
metadata:
  key: dashboard.household.survey
  name: Household Survey Overview
spec:
  slug: household-survey
  chartHeight: 100
  # Layout rules:
  # - `fullWidthFirst: 2` → the first two chartRefs (Rural Segments table and
  #   the India state map) each get their own full-width row.
  # - `chartsPerRow: 2` → remaining charts render in two columns per row after
  #   the two full-width lead charts.
  # - `chartHeights` → per-chart height override. The state map needs more
  #   vertical space than the default so India is clearly readable.
  fullWidthFirst: 2
  chartsPerRow: 2
  crossFiltersEnabled: true
  chartHeights:
    chart.household.state_map: 130
  chartRefs:
    - chart.household.rural_segment_comparison
    - chart.household.state_map
    - chart.household.district_pie_bihar
    - chart.household.district_pie_jharkhand
    - chart.household.district_pie_madhya_pradesh
    - chart.household.minor_structure
    - chart.household.segment_distribution_pie
    - chart.household.state_segment_distribution_bar
  # Cross-filtering enabled via crossFiltersEnabled: clicking a state on the
  # map filters the rural segments table and other compatible charts.
