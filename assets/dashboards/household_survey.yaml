apiVersion: analytics/v1
kind: Dashboard
metadata:
  key: dashboard.household.survey
  name: Household Survey Overview
spec:
  slug: household-survey
  chartHeight: 100
  # Layout rules:
  # - `fullWidthFirst: 2` → the first two chartRefs (Rural Segments table and
  #   the India state map) each get their own full-width row.
  # - `chartsPerRow: 2` → remaining charts render in two columns per row after
  #   the two full-width lead charts.
  # - `chartHeights` → per-chart height override. The state map needs more
  #   vertical space than the default so India is clearly readable.
  fullWidthFirst: 2
  chartsPerRow: 2
  crossFiltersEnabled: true
  chartHeights:
    chart.household.state_map: 130
  chartRefs:
    - chart.household.rural_segment_comparison
    - chart.household.state_map
    - chart.household.district_pie_bihar
    - chart.household.district_pie_jharkhand
    - chart.household.district_pie_madhya_pradesh
    - chart.household.minor_structure
    - chart.household.segment_distribution_pie
    - chart.household.state_segment_distribution_bar
  # Cross-filtering enabled via crossFiltersEnabled: clicking a state on the
  # map filters the rural segments table and other compatible charts.
  #
  # ── Dashboard-level native filters ─────────────────────────────────────────
  # The UI previously showed "No global filters are currently added" because
  # `native_filter_configuration` was missing from json_metadata. These
  # declarations are translated into that array by the reconciler.
  #
  # Filter matching in Superset is by column NAME on the target dataset —
  # a filter's extraFormData is applied only to charts whose datasource has
  # the named column. That means these filters only meaningfully affect the
  # two hh_master-backed charts (state_map, rural_segment_comparison); the
  # pre-aggregated LCA segment views use a different schema and are
  # unaffected by design.
  nativeFilters:
    - key: filter.household.state
      name: State
      filterType: filter_select
      description: Filter households by Indian state / union territory.
      targets:
        - datasetRef: dataset.household.hh_master
          column: State_label
      controlValues:
        multiSelect: true
        enableEmptyFilter: false
        defaultToFirstItem: false
        inverseSelection: false
        searchAllOptions: false
    - key: filter.household.sector
      name: Sector
      filterType: filter_select
      description: Rural vs. urban households.
      targets:
        - datasetRef: dataset.household.hh_master
          column: Sector_label
      controlValues:
        multiSelect: false
        enableEmptyFilter: false
        defaultToFirstItem: false
        inverseSelection: false
        searchAllOptions: false
    - key: filter.household.social_group
      name: Social group of HH head
      filterType: filter_select
      description: SC / ST / OBC / Others composition of the head of household.
      targets:
        - datasetRef: dataset.household.hh_master
          column: Social_Group_of_HH_Head_label
      controlValues:
        multiSelect: true
        enableEmptyFilter: false
        defaultToFirstItem: false
        inverseSelection: false
        searchAllOptions: false
