apiVersion: analytics/v1
kind: Dataset
metadata:
  key: dataset.household.state_district_segment_geo
  name: lca_state_district_segment_geo
spec:
  databaseRef: db.analytics
  schema: household
  table: vw_state_district_segment_geo
  # Long-form (state, district, segment, hh_weight) with a `geometry` column
  # containing a GeoJSON Point ({"type":"Point","coordinates":[lon,lat]}).
  # Current consumer: `chart.household.district_pie_unified`, a 100%-stacked
  # echarts bar that reads district_name / segment / hh_weight. The
  # `geometry` column is retained for future map-based charts; the previous
  # Cartodiagram + pie consumer was removed because the pie sub-chart does
  # not render under Superset 6.0 (apache/superset#34247).
