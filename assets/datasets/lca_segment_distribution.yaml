apiVersion: analytics/v1
kind: Dataset
metadata:
  key: dataset.household.segment_distribution
  name: lca_segment_distribution
spec:
  databaseRef: db.analytics
  schema: household
  table: vw_segment_distribution
  # Grain: (state_label, sector_label, segment) with SUM(wt) already
  # applied inside the view. Charts re-aggregate via their own SUM() at
  # query time; extra dimensions give Superset's drill-by menu pivot
  # targets (state_label, sector_label) from a chart that groups only
  # by segment.
  dimensions:
    - state_label
    - sector_label
    - segment
