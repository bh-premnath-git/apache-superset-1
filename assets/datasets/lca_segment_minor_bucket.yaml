apiVersion: analytics/v1
kind: Dataset
metadata:
  key: dataset.household.segment_minor_bucket
  name: lca_segment_minor_bucket
spec:
  databaseRef: db.analytics
  schema: household
  table: vw_segment_minor_bucket
  # Grain: (state_label, sector_label, segment, minor_bucket) with
  # SUM(wt) applied inside the view. The stacked bar chart
  # (household_minor_structure) re-aggregates to (segment,
  # minor_bucket) at query time and uses stack: Expand for a
  # 100%-stacked visual. state_label / sector_label are carried so
  # drill-by has pivot targets.
  dimensions:
    - state_label
    - sector_label
    - segment
    - minor_bucket
