# ⚠️  NOT WIRED INTO ANY DASHBOARD.  The household_survey dashboard uses the
# built-in ``cartodiagram`` viz (Superset 6.1+), so registering this custom
# plugin is optional scaffolding.
#
# Additionally, FEATURE_FLAGS['DYNAMIC_PLUGINS'] is currently False in
# superset_config.py because the frontend ``DynamicPluginProvider`` hangs in
# ``loading: true`` when ``/dynamic-plugins/api/read`` 404s — a regression in
# Superset 6.0/6.1 closed as ``not planned`` upstream
# (https://github.com/apache/superset/issues/35870).  The reconciler therefore
# skips this asset (``preflight`` raises ``SkipAsset`` or the API 404s).
#
# To actually register this plugin once upstream is fixed:
#   1. Flip FEATURE_FLAGS['DYNAMIC_PLUGINS'] back to True
#   2. Keep plugin-builder running in docker-compose.yml (currently enabled)
#   3. Point a chart at ``vizType: state_district_pies`` so it's used
apiVersion: analytics/v1
kind: Plugin
metadata:
  key: plugin.chart.state_district_pies
  name: State + District Pies
spec:
  # vizType is the identifier charts reference. MUST match the `key`
  # passed to `.configure({ key: ... })` on the ChartPlugin class. See
  # superset-plugins/plugin-chart-state-district-pies/README.md.
  vizType: state_district_pies

  # Bundle URL is what Superset's browser loads at runtime.
  # Resolution is fully env-driven (see _resolve_bundle_url in seed_dashboard.py):
  #   1. bundleUrlFromEnv → ready-to-use URL
  #   2. bundlePathFromEnv → local .js path, combined with staticMountPath
  #   3. bundleUrl → literal fallback (not used here)
  bundleUrlFromEnv: STATE_DISTRICT_PIES_PLUGIN_BUNDLE_URL
  bundlePathFromEnv: STATE_DISTRICT_PIES_PLUGIN_BUNDLE_PATH

  # staticMountPath tells the reconciler where Superset serves this plugin's
  # assets so it can convert a local build path to a browser-loadable URL.
  # Must match the volume mount in docker-compose.yml.
  staticMountPath: /static/assets/plugins/state-district-pies

  description: |
    India state choropleth overlaid with a per-district proportional pie.
    Designed for the LCA segment mix but works with any
    (state, district, category → metric) dataset.
  featureFlag: DYNAMIC_PLUGINS
