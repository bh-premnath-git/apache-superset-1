apiVersion: analytics/v1
kind: Plugin
metadata:
  key: plugin.chart.custom_waterfall
  name: Custom Waterfall Chart
spec:
  vizType: custom_waterfall
  # Bundle URL is injected from environment — never hardcoded here because
  # dynamic plugin bundles must be built from source and self-hosted.
  #
  # Workflow to produce a bundle:
  #   1. Fork https://github.com/apache-superset/dynamic-import-demo-plugin
  #   2. npm install && npm run build-prod
  #   3. Host the /dist output on your own CDN, S3 bucket, or static server
  #   4. Set WATERFALL_PLUGIN_BUNDLE_URL in .env to the hosted URL
  #      e.g. https://static.example.com/superset-plugins/waterfall/main.js
  #
  # For local dev, run `npm run serve` and use http://127.0.0.1:8080/main.js
  bundleUrlFromEnv: WATERFALL_PLUGIN_BUNDLE_URL
  description: "Waterfall chart with positive/negative deltas and subtotals"
  featureFlag: DYNAMIC_PLUGINS
